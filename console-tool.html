<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Console Inspector Pro</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap');

*,
*::before,
*::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0a0b0e;
  --surface: #111318;
  --surface2: #181b22;
  --border: #252932;
  --border2: #2e3340;

  --text: #e2e8f0;
  --muted: #6b7585;

  --accent: #4ade80;
  --accent-d: #166534;

  --blue: #60a5fa;
  --yellow: #fbbf24;
  --red: #f87171;
  --orange: #fb923c;
  --purple: #a78bfa;
  --cyan: #22d3ee;

  --mono: 'JetBrains Mono', monospace;
  --sans: 'Syne', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ───────────────── TOPBAR ───────────────── */

.topbar {
  display: flex;
  align-items: center;
  gap: 10px;

  padding: 10px 14px;

  background: var(--surface);
  border-bottom: 1px solid var(--border);

  flex-shrink: 0;
}

.topbar-logo {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.05em;

  color: var(--accent);

  white-space: nowrap;

  padding-right: 10px;
  border-right: 1px solid var(--border2);
}

.mode-switch {
  display: flex;
  overflow: hidden;

  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 6px;

  flex-shrink: 0;
}

.mode-btn {
  border: none;
  background: transparent;

  padding: 7px 13px;

  color: var(--muted);

  font-size: 11px;
  font-family: var(--sans);
  font-weight: 700;
  letter-spacing: 0.04em;

  cursor: pointer;
  transition: all 0.15s ease;
}

.mode-btn.active {
  background: var(--surface2);
  color: var(--accent);
}

.url-bar {
  flex: 1;
  display: flex;
  gap: 8px;
}

.url-bar input {
  flex: 1;

  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 6px;

  padding: 8px 12px;

  color: var(--text);

  outline: none;

  font-family: var(--mono);
  font-size: 12px;

  transition: border-color 0.2s ease;
}

.url-bar input:focus {
  border-color: var(--accent);
}

.btn-load {
  border: none;
  border-radius: 6px;

  background: var(--accent);
  color: #000;

  padding: 8px 16px;

  cursor: pointer;

  font-family: var(--sans);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.05em;

  transition: opacity 0.15s ease;
}

.btn-load:hover {
  opacity: 0.85;
}

/* ───────────────── MAIN ───────────────── */

.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ───────────────── VIEWER ───────────────── */

.viewer-wrap {
  flex: 1;
  min-width: 0;

  display: flex;
  flex-direction: column;

  background: #000;
  position: relative;
}

iframe {
  width: 100%;
  flex: 1;
  border: none;
  background: #fff;
}

/* HTML MODE */

.html-editor-wrap {
  flex: 1;

  display: flex;
  flex-direction: column;

  overflow: hidden;
}

.html-editor-wrap textarea {
  flex: 1;

  background: var(--bg);
  color: var(--text);

  border: none;
  outline: none;

  resize: none;

  padding: 16px;

  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.7;
}

.editor-actions {
  display: flex;
  gap: 8px;

  padding: 8px 12px;

  background: var(--surface);

  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.editor-actions button {
  border: none;
  border-radius: 5px;

  padding: 6px 14px;

  cursor: pointer;

  font-family: var(--sans);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;

  transition: opacity 0.15s ease;
}

.btn-run {
  background: var(--accent);
  color: #000;
}

.btn-run:hover {
  opacity: 0.85;
}

.btn-clear-editor {
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border2);
}

.iframe-preview {
  height: 260px;
  position: relative;

  border-top: 1px solid var(--border);
}

/* STATUS */

.status-badge {
  position: absolute;
  bottom: 10px;
  left: 10px;

  display: flex;
  align-items: center;
  gap: 5px;

  z-index: 10;

  background: var(--surface);

  border: 1px solid var(--border2);
  border-radius: 20px;

  padding: 4px 10px;

  font-size: 11px;
  font-family: var(--mono);
  font-weight: 600;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;

  background: var(--muted);
}

.status-dot.ok {
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
}

.status-dot.err {
  background: var(--red);
  box-shadow: 0 0 6px var(--red);
}

.status-dot.loading {
  background: var(--yellow);
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ───────────────── PANEL ───────────────── */

.panel {
  width: 430px;
  flex-shrink: 0;

  display: flex;
  flex-direction: column;

  overflow: hidden;

  background: var(--surface);

  border-left: 1px solid var(--border);
}

/* TABS */

.tabs {
  display: flex;
  overflow-x: auto;

  border-bottom: 1px solid var(--border);

  flex-shrink: 0;
}

.tabs::-webkit-scrollbar {
  display: none;
}

.tab {
  flex: 1;
  min-width: 55px;

  position: relative;

  padding: 10px 4px;

  text-align: center;

  color: var(--muted);

  border-bottom: 2px solid transparent;

  cursor: pointer;

  white-space: nowrap;

  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.06em;

  transition: all 0.15s ease;
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  background: var(--surface2);
}

.tab .badge {
  position: absolute;
  top: 4px;
  right: 6px;

  display: none;

  min-width: 14px;

  padding: 1px 4px;

  border-radius: 8px;

  background: var(--red);
  color: #fff;

  text-align: center;

  font-size: 8px;
  font-weight: 700;
}

.tab .badge.show {
  display: inline-block;
}

/* SEARCH */

.search-bar {
  display: flex;
  align-items: center;
  gap: 6px;

  padding: 7px 10px;

  border-bottom: 1px solid var(--border);

  flex-shrink: 0;
}

.search-bar input {
  flex: 1;

  background: var(--bg);

  border: 1px solid var(--border2);
  border-radius: 5px;

  padding: 5px 10px;

  color: var(--text);

  outline: none;

  font-family: var(--mono);
  font-size: 11px;
}

.search-bar input:focus {
  border-color: var(--accent);
}

.log-count {
  white-space: nowrap;

  color: var(--muted);

  font-family: var(--mono);
  font-size: 10px;
}

/* CORS */

.cors-banner {
  display: none;

  margin: 8px;
  padding: 10px 12px;

  border-radius: 6px;

  background: #1a0e00;
  border: 1px solid var(--yellow);

  color: var(--yellow);

  font-size: 11px;
  line-height: 1.6;
}

.cors-banner.show {
  display: block;
}

/* LOGS */

.logs {
  flex: 1;

  overflow-y: auto;
  scroll-behavior: smooth;

  padding: 6px;
}

.logs::-webkit-scrollbar {
  width: 4px;
}

.logs::-webkit-scrollbar-thumb {
  background: var(--border2);
  border-radius: 2px;
}

.log {
  position: relative;

  margin-bottom: 4px;
  padding: 8px 10px;

  border-left: 3px solid transparent;
  border-radius: 6px;

  cursor: pointer;

  word-break: break-word;

  transition: filter 0.1s ease;

  font-family: var(--mono);
  font-size: 11.5px;
  line-height: 1.6;
}

.log:hover {
  filter: brightness(1.15);
}

.log-meta {
  display: flex;
  gap: 8px;

  margin-bottom: 4px;

  opacity: 0.6;

  font-size: 10px;
}

.log-msg {
  white-space: pre-wrap;
}

.log-stack {
  display: none;

  margin-top: 6px;
  padding-top: 4px;

  border-top: 1px solid rgba(255,255,255,0.06);

  opacity: 0.65;

  white-space: pre-wrap;

  font-size: 10px;
}

.log.expanded .log-stack {
  display: block;
}

.log-log {
  background: #111520;
  border-left-color: #2563eb;
  color: #c9d1d9;
}

.log-info {
  background: #0d1b2a;
  border-left-color: var(--blue);
  color: var(--blue);
}

.log-warn {
  background: #1a1200;
  border-left-color: var(--yellow);
  color: var(--yellow);
}

.log-error {
  background: #1a0606;
  border-left-color: var(--red);
  color: var(--red);
}

.log-network {
  background: #0a1520;
  border-left-color: var(--cyan);
  color: var(--cyan);
}

.log-promise {
  background: #1a0a1a;
  border-left-color: var(--purple);
  color: var(--purple);
}

/* BOTTOM */

.bottom {
  display: flex;
  align-items: center;
  gap: 6px;

  padding: 8px 10px;

  border-top: 1px solid var(--border);

  flex-shrink: 0;
}

.bottom button {
  background: var(--surface2);

  border: 1px solid var(--border2);
  border-radius: 5px;

  padding: 7px 12px;

  color: var(--muted);

  cursor: pointer;

  font-family: var(--sans);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;

  transition: all 0.15s ease;
}

.bottom button:hover {
  color: var(--text);
  border-color: var(--text);
}

.btn-copy {
  margin-left: auto;
}

.autoscroll-label {
  display: flex;
  align-items: center;
  gap: 4px;

  user-select: none;
  cursor: pointer;

  color: var(--muted);

  font-size: 10px;
}

.autoscroll-label input {
  accent-color: var(--accent);
}

/* RESPONSIVE */

@media (max-width: 900px) {

  .main {
    flex-direction: column;
  }

  .panel {
    width: 100%;
    height: 45%;

    border-left: none;
    border-top: 1px solid var(--border);
  }

  .viewer-wrap {
    height: 55%;
  }

  .topbar-logo {
    display: none;
  }
}
</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

  <div class="topbar-logo">
    ⬡ INSPECTOR
  </div>

  <div class="mode-switch">
    <button class="mode-btn active" id="modeUrl">
      URL
    </button>

    <button class="mode-btn" id="modeHtml">
      HTML
    </button>
  </div>

  <div class="url-bar" id="urlBar">
    <input
      type="text"
      id="urlInput"
      placeholder="https://example.com"
    />

    <button class="btn-load" id="runUrlBtn">
      RUN
    </button>
  </div>

</div>

<!-- MAIN -->

<div class="main">

  <!-- VIEWER -->

  <div class="viewer-wrap">

    <!-- URL MODE -->

    <div
      id="urlModeView"
      style="flex:1;display:flex;flex-direction:column;position:relative;"
    >
      <iframe id="viewer"></iframe>

      <div class="status-badge">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Ready</span>
      </div>
    </div>

    <!-- HTML MODE -->

    <div
      class="html-editor-wrap"
      id="htmlModeView"
      style="display:none;"
    >

<textarea id="htmlEditor" placeholder="Paste your HTML/JS code here...

<!DOCTYPE html>
<html>
<body>
<script>
console.log('Hello!');
fetch('/api/test');
undefinedFunction();
</script>
</body>
</html>"></textarea>

      <div class="editor-actions">
        <button class="btn-run" id="runHtmlBtn">
          ▶ RUN
        </button>

        <button class="btn-clear-editor" id="clearEditorBtn">
          CLEAR
        </button>
      </div>

      <div class="iframe-preview">

        <iframe id="htmlViewer"></iframe>

        <div
          class="status-badge"
          style="bottom:8px;left:8px;"
        >
          <div class="status-dot" id="statusDot2"></div>
          <span id="statusText2">Ready</span>
        </div>

      </div>

    </div>

  </div>

  <!-- PANEL -->

  <div class="panel">

    <!-- TABS -->

    <div class="tabs">

      <div class="tab active" data-type="all">
        ALL
        <span class="badge" id="badge-all"></span>
      </div>

      <div class="tab" data-type="log">
        LOG
        <span class="badge" id="badge-log"></span>
      </div>

      <div class="tab" data-type="info">
        INFO
        <span class="badge" id="badge-info"></span>
      </div>

      <div class="tab" data-type="warn">
        WARN
        <span class="badge" id="badge-warn"></span>
      </div>

      <div class="tab" data-type="error">
        ERR
        <span class="badge" id="badge-error"></span>
      </div>

      <div class="tab" data-type="network">
        NET
        <span class="badge" id="badge-network"></span>
      </div>

      <div class="tab" data-type="promise">
        PROM
        <span class="badge" id="badge-promise"></span>
      </div>

    </div>

    <!-- SEARCH -->

    <div class="search-bar">

      <input
        type="text"
        id="searchInput"
        placeholder="Search logs..."
      />

      <span class="log-count" id="logCount">
        0 logs
      </span>

    </div>

    <!-- CORS -->

    <div class="cors-banner" id="corsBanner">
      ⚠ Cross-origin restriction: console injection blocked.<br>
      Switch to <strong>HTML mode</strong> to debug local code,
      or use a same-origin page.
    </div>

    <!-- LOGS -->

    <div class="logs" id="logs"></div>

    <!-- BOTTOM -->

    <div class="bottom">

      <label class="autoscroll-label">
        <input type="checkbox" id="autoScroll" checked />
        Auto-scroll
      </label>

      <button id="clearLogsBtn">
        CLEAR
      </button>

      <button class="btn-copy" id="copyLogsBtn">
        COPY
      </button>

    </div>

  </div>

</div>

<script>
/* ───────────────── STATE ───────────────── */

const state = {
  logs: [],
  filter: 'all',
  mode: 'url'
};

const iframe = document.getElementById('viewer');
const htmlViewer = document.getElementById('htmlViewer');
const logsEl = document.getElementById('logs');

/* ───────────────── UTIL ───────────────── */

function now() {
  const d = new Date();

  return (
    d.toLocaleTimeString('en-GB', { hour12: false }) +
    '.' +
    String(d.getMilliseconds()).padStart(3, '0')
  );
}

function stringify(value) {

  if (value === null) return 'null';
  if (value === undefined) return 'undefined';

  if (value instanceof Error) {
    return (
      value.name +
      ': ' +
      value.message +
      (value.stack ? '\n' + value.stack : '')
    );
  }

  if (typeof value === 'object') {
    try {
      return JSON.stringify(value, null, 2);
    } catch {
      return '[Circular Object]';
    }
  }

  return String(value);
}

function formatArgs(args) {
  return args.map(stringify).join(' ');
}

/* ───────────────── TOAST ───────────────── */

function showToast(message) {

  const toast = document.createElement('div');

  toast.textContent = message;

  Object.assign(toast.style, {
    position: 'fixed',
    bottom: '60px',
    left: '50%',
    transform: 'translateX(-50%)',

    background: '#4ade80',
    color: '#000',

    padding: '6px 14px',
    borderRadius: '20px',

    fontFamily: 'var(--sans)',
    fontWeight: '700',
    fontSize: '12px',

    zIndex: '9999',

    opacity: '1',
    transition: 'opacity .4s ease'
  });

  document.body.appendChild(toast);

  setTimeout(() => {

    toast.style.opacity = '0';

    setTimeout(() => {
      toast.remove();
    }, 400);

  }, 1200);
}

/* ───────────────── LOG ENGINE ───────────────── */

function addLog(type, message, stack = '') {

  state.logs.push({
    id: crypto.randomUUID(),
    type,
    message,
    stack,
    time: now()
  });

  updateBadges();
  renderLogs();
}

function clearLogs() {

  state.logs = [];

  updateBadges();
  renderLogs();
}

async function copyLogs() {

  const text = state.logs
    .map(log => {

      let output =
        `[${log.time}] ` +
        `[${log.type.toUpperCase()}] ` +
        log.message;

      if (log.stack) {
        output += '\nSTACK:\n' + log.stack;
      }

      return output;

    })
    .join('\n\n');

  try {

    await navigator.clipboard.writeText(text);
    showToast('Copied!');

  } catch {

    prompt('Copy logs manually:', text);

  }
}

function updateBadges() {

  const types = [
    'log',
    'info',
    'warn',
    'error',
    'network',
    'promise'
  ];

  types.forEach(type => {

    const count =
      state.logs.filter(log => log.type === type).length;

    const badge =
      document.getElementById(`badge-${type}`);

    if (!badge) return;

    badge.textContent = count;
    badge.classList.toggle('show', count > 0);

  });

  const allBadge =
    document.getElementById('badge-all');

  allBadge.textContent = state.logs.length;
  allBadge.classList.toggle(
    'show',
    state.logs.length > 0
  );
}

function renderLogs() {

  const search =
    document
      .getElementById('searchInput')
      .value
      .trim()
      .toLowerCase();

  const filtered = state.logs.filter(log => {

    const matchType =
      state.filter === 'all' ||
      log.type === state.filter;

    const haystack =
      `${log.message} ${log.stack} ${log.type}`
        .toLowerCase();

    const matchSearch =
      !search || haystack.includes(search);

    return matchType && matchSearch;

  });

  document.getElementById('logCount').textContent =
    `${filtered.length} / ${state.logs.length}`;

  logsEl.innerHTML = '';

  const fragment = document.createDocumentFragment();

  filtered.forEach(log => {

    const div = document.createElement('div');

    div.className = `log log-${log.type}`;

    const meta = document.createElement('div');
    meta.className = 'log-meta';
    meta.innerHTML =
      `<span>${log.time}</span>` +
      `<span>${log.type.toUpperCase()}</span>`;

    const msg = document.createElement('div');
    msg.className = 'log-msg';
    msg.textContent = log.message;

    div.append(meta, msg);

    if (log.stack) {

      const stack = document.createElement('div');

      stack.className = 'log-stack';
      stack.textContent = log.stack;

      div.appendChild(stack);

      div.title = 'Click to expand stack trace';

      div.addEventListener('click', () => {
        div.classList.toggle('expanded');
      });
    }

    fragment.appendChild(div);

  });

  logsEl.appendChild(fragment);

  if (document.getElementById('autoScroll').checked) {
    logsEl.scrollTop = logsEl.scrollHeight;
  }
}

/* ───────────────── STATUS ───────────────── */

function setStatus(
  text,
  stateName = '',
  dotId = 'statusDot',
  textId = 'statusText'
) {

  const dot = document.getElementById(dotId);
  const span = document.getElementById(textId);

  if (!dot || !span) return;

  dot.className = `status-dot ${stateName}`;
  span.textContent = text;
}

/* ───────────────── DEBUGGER ───────────────── */

function injectDebugger(win, label = '') {

  const prefix =
    label ? `[${label}] ` : '';

  /* console */

  const map = {
    log: 'log',
    info: 'info',
    warn: 'warn',
    error: 'error',
    debug: 'log'
  };

  Object.entries(map).forEach(([method, type]) => {

    const original =
      win.console[method].bind(win.console);

    win.console[method] = (...args) => {

      addLog(
        type,
        prefix + formatArgs(args)
      );

      original(...args);
    };
  });

  /* console.table */

  const originalTable =
    win.console.table.bind(win.console);

  win.console.table = data => {

    addLog(
      'log',
      prefix + '[table]\n' + stringify(data)
    );

    originalTable(data);
  };

  /* group */

  win.console.group = (...args) => {
    addLog(
      'log',
      prefix + '▶ group: ' + formatArgs(args)
    );
  };

  win.console.groupEnd = () => {};

  /* assert */

  win.console.assert = (condition, ...args) => {

    if (!condition) {

      addLog(
        'error',
        prefix +
        'Assertion failed: ' +
        formatArgs(args)
      );
    }
  };

  /* time */

  win.__timers = {};

  win.console.time = labelName => {
    win.__timers[labelName] = performance.now();
  };

  win.console.timeEnd = labelName => {

    const start =
      win.__timers[labelName];

    const duration =
      start != null
        ? (performance.now() - start).toFixed(2) + 'ms'
        : '?';

    addLog(
      'log',
      prefix +
      `[timer] ${labelName}: ${duration}`
    );
  };

  /* errors */

  win.addEventListener('error', event => {

    addLog(
      'error',
      prefix + event.message,
      `File: ${event.filename}\nLine: ${event.lineno}:${event.colno}`
    );
  });

  /* promise */

  win.addEventListener(
    'unhandledrejection',
    event => {

      const reason = event.reason;

      const msg =
        reason instanceof Error
          ? `${reason.name}: ${reason.message}`
          : stringify(reason);

      addLog(
        'promise',
        prefix +
        `Unhandled Promise Rejection: ${msg}`,
        reason?.stack || ''
      );
    }
  );

  /* fetch */

  if (win.fetch) {

    const originalFetch =
      win.fetch.bind(win);

    win.fetch = async (...args) => {

      const url =
        typeof args[0] === 'string'
          ? args[0]
          : args[0]?.url || String(args[0]);

      const method =
        (args[1]?.method || 'GET')
          .toUpperCase();

      const start = performance.now();

      addLog(
        'network',
        prefix + `→ ${method} ${url}`
      );

      try {

        const response =
          await originalFetch(...args);

        const duration =
          Math.round(
            performance.now() - start
          );

        addLog(
          'network',
          prefix +
          `${response.ok ? '✓' : '✗'} ` +
          `${method} ${url} ` +
          `— ${response.status} ` +
          `(${duration}ms)`
        );

        return response;

      } catch (error) {

        addLog(
          'error',
          prefix +
          `fetch failed: ${url}\n${error.message}`
        );

        throw error;
      }
    };
  }

  /* XHR */

  const OriginalXHR = win.XMLHttpRequest;

  win.XMLHttpRequest = function () {

    const xhr = new OriginalXHR();

    const info = {
      method: '',
      url: ''
    };

    const open =
      xhr.open.bind(xhr);

    const send =
      xhr.send.bind(xhr);

    xhr.open = function (
      method,
      url,
      ...rest
    ) {

      info.method = method;
      info.url = url;

      return open(method, url, ...rest);
    };

    xhr.send = function (body) {

      const start = performance.now();

      addLog(
        'network',
        prefix +
        `→ XHR ${info.method} ${info.url}`
      );

      xhr.addEventListener('load', () => {

        const duration =
          Math.round(
            performance.now() - start
          );

        addLog(
          'network',
          prefix +
          `${xhr.status >= 200 && xhr.status < 400 ? '✓' : '✗'} ` +
          `XHR ${info.method} ${info.url} ` +
          `— ${xhr.status} (${duration}ms)`
        );
      });

      xhr.addEventListener('error', () => {

        addLog(
          'error',
          prefix +
          `XHR network error: ${info.method} ${info.url}`
        );
      });

      return send(body);
    };

    return xhr;
  };

  addLog(
    'log',
    prefix +
    '🔌 Debugger injected — monitoring console, fetch, XHR, errors, promises'
  );
}

/* ───────────────── URL MODE ───────────────── */

function loadUrl() {

  let url =
    document.getElementById('urlInput')
      .value
      .trim();

  if (!url) {
    alert('Enter a URL');
    return;
  }

  if (!/^https?:\/\//i.test(url)) {
    url = 'https://' + url;
  }

  document
    .getElementById('corsBanner')
    .classList.remove('show');

  setStatus('Loading...', 'loading');

  addLog(
    'network',
    `Opening: ${url}`
  );

  iframe.src = url;
}

iframe.addEventListener('load', () => {

  setStatus('Loaded', 'ok');

  addLog(
    'log',
    `Page loaded: ${iframe.src}`
  );

  try {

    injectDebugger(
      iframe.contentWindow,
      'iframe'
    );

  } catch {

    document
      .getElementById('corsBanner')
      .classList.add('show');

    setStatus(
      'Cross-origin',
      'err'
    );

    addLog(
      'error',
      'Cross-origin restriction: cannot inject debugger.\n' +
      'Reason: different origin or strict CSP.\n' +
      'Solution: use HTML mode for local debugging.'
    );
  }
});

iframe.addEventListener('error', () => {

  setStatus('Failed', 'err');

  addLog(
    'error',
    'Failed to load URL. Check the address or CORS policy.'
  );
});

/* ───────────────── HTML MODE ───────────────── */

function runHtml() {

  const code =
    document.getElementById('htmlEditor').value;

  if (!code.trim()) {

    alert('Paste some HTML first');
    return;
  }

  setStatus(
    'Running...',
    'loading',
    'statusDot2',
    'statusText2'
  );

  addLog(
    'network',
    '▶ Running HTML snippet...'
  );

  const spy = `
<script>
(function(){

  function send(type,msg,stack){
    parent.postMessage({
      __spy:true,
      type:type,
      msg:msg,
      stack:stack || ''
    },'*');
  }

  function stringify(value){

    if(value===null)return 'null';
    if(value===undefined)return 'undefined';

    if(value instanceof Error){
      return value.name+': '+value.message+
      (value.stack?'\\n'+value.stack:'');
    }

    if(typeof value==='object'){
      try{
        return JSON.stringify(value,null,2);
      }catch{
        return '[Circular Object]';
      }
    }

    return String(value);
  }

  ['log','info','warn','error','debug']
    .forEach(function(method){

      var original = console[method].bind(console);

      console[method]=function(){

        var args=[].slice.call(arguments);

        send(
          method==='debug'?'log':method,
          args.map(stringify).join(' ')
        );

        original.apply(console,args);
      };
    });

  window.addEventListener('error',function(e){

    send(
      'error',
      e.message,
      'File: '+e.filename+'\\nLine: '+e.lineno+':'+e.colno
    );
  });

  window.addEventListener(
    'unhandledrejection',
    function(e){

      var r=e.reason;

      send(
        'promise',
        'Unhandled Promise Rejection: '+
        stringify(r),
        r && r.stack ? r.stack : ''
      );
    }
  );

  send(
    'log',
    '🔌 Debugger injected (HTML mode)'
  );

})();
<\/script>`;

  let patched = code;

  if (/<head[^>]*>/i.test(code)) {

    patched =
      code.replace(
        /(<head[^>]*>)/i,
        '$1' + spy
      );

  } else if (/<body[^>]*>/i.test(code)) {

    patched =
      code.replace(
        /(<body[^>]*>)/i,
        '$1' + spy
      );

  } else {

    patched = spy + code;
  }

  htmlViewer.srcdoc = patched;
}

htmlViewer.addEventListener('load', () => {

  setStatus(
    'Running',
    'ok',
    'statusDot2',
    'statusText2'
  );
});

/* ───────────────── POST MESSAGE ───────────────── */

window.addEventListener('message', event => {

  if (!event.data || !event.data.__spy) {
    return;
  }

  const {
    type,
    msg,
    stack
  } = event.data;

  const allowed = [
    'log',
    'info',
    'warn',
    'error',
    'network',
    'promise'
  ];

  addLog(
    allowed.includes(type)
      ? type
      : 'log',
    msg,
    stack || ''
  );
});

/* ───────────────── MODE SWITCH ───────────────── */

function switchMode(mode) {

  state.mode = mode;

  document
    .getElementById('modeUrl')
    .classList.toggle(
      'active',
      mode === 'url'
    );

  document
    .getElementById('modeHtml')
    .classList.toggle(
      'active',
      mode === 'html'
    );

  document
    .getElementById('urlBar')
    .style.display =
      mode === 'url'
        ? 'flex'
        : 'none';

  document
    .getElementById('urlModeView')
    .style.display =
      mode === 'url'
        ? 'flex'
        : 'none';

  document
    .getElementById('htmlModeView')
    .style.display =
      mode === 'html'
        ? 'flex'
        : 'none';

  document
    .getElementById('corsBanner')
    .classList.remove('show');
}

/* ───────────────── EVENTS ───────────────── */

document
  .getElementById('runUrlBtn')
  .addEventListener('click', loadUrl);

document
  .getElementById('runHtmlBtn')
  .addEventListener('click', runHtml);

document
  .getElementById('clearEditorBtn')
  .addEventListener('click', () => {

    document.getElementById('htmlEditor').value = '';
  });

document
  .getElementById('clearLogsBtn')
  .addEventListener('click', clearLogs);

document
  .getElementById('copyLogsBtn')
  .addEventListener('click', copyLogs);

document
  .getElementById('searchInput')
  .addEventListener('input', renderLogs);

document
  .getElementById('modeUrl')
  .addEventListener('click', () => {
    switchMode('url');
  });

document
  .getElementById('modeHtml')
  .addEventListener('click', () => {
    switchMode('html');
  });

document
  .getElementById('urlInput')
  .addEventListener('keydown', e => {

    if (e.key === 'Enter') {
      loadUrl();
    }
  });

document
  .querySelectorAll('.tab')
  .forEach(tab => {

    tab.addEventListener('click', () => {

      document
        .querySelectorAll('.tab')
        .forEach(t => {
          t.classList.remove('active');
        });

      tab.classList.add('active');

      state.filter =
        tab.dataset.type;

      renderLogs();
    });
  });

/* ───────────────── INIT ───────────────── */

addLog(
  'log',
  'Console Inspector Pro ready.\n' +
  '• URL mode: open same-origin websites\n' +
  '• HTML mode: run local HTML/JS with debugger'
);
</script>
