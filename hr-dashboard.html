<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Naruna HR</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{

  --bg:#0f172a;
  --bg2:#111827;
  --card:#182235;
  --card2:#1f2c44;

  --line:#2b3954;

  --text:#f8fafc;
  --text2:#cbd5e1;
  --text3:#94a3b8;

  --primary:#7c3aed;
  --primary2:#8b5cf6;

  --danger:#ef4444;
  --success:#22c55e;
  --warning:#f59e0b;

  --shadow:
    0 10px 40px rgba(0,0,0,.35);

  --radius:18px;
}

html,
body{
  height:100%;
  font-family:'Inter',sans-serif;
  background:
    linear-gradient(
      180deg,
      #0b1120,
      #111827
    );
  color:var(--text);
}

body{
  overflow:hidden;
}

/* APP */

.app{
  display:flex;
  height:100vh;
}

/* SIDEBAR */

.sidebar{
  width:280px;
  background:rgba(17,24,39,.92);
  border-right:1px solid var(--line);

  display:flex;
  flex-direction:column;

  backdrop-filter:blur(18px);
}

.logo{
  padding:24px;
  border-bottom:1px solid var(--line);
}

.logo h1{
  font-size:22px;
  font-weight:800;
}

.logo p{
  margin-top:4px;
  color:var(--text3);
  font-size:13px;
}

.sidebar-top{
  padding:20px;
}

.btn{
  border:none;
  cursor:pointer;

  background:var(--primary);
  color:white;

  padding:12px 16px;

  border-radius:14px;

  font-weight:600;
  font-size:14px;

  transition:.2s;
}

.btn:hover{
  background:var(--primary2);
}

.btn-full{
  width:100%;
}

.outlet-list{
  flex:1;
  overflow:auto;
  padding:0 14px 20px;
}

.outlet-item{
  background:transparent;
  border:1px solid transparent;

  padding:16px;
  border-radius:16px;

  margin-bottom:10px;

  cursor:pointer;

  transition:.2s;
}

.outlet-item:hover{
  background:rgba(255,255,255,.04);
}

.outlet-item.active{
  background:
    linear-gradient(
      135deg,
      rgba(124,58,237,.18),
      rgba(124,58,237,.08)
    );

  border-color:
    rgba(139,92,246,.35);
}

.outlet-name{
  font-size:15px;
  font-weight:700;
}

.outlet-sub{
  margin-top:6px;
  color:var(--text3);
  font-size:12px;
}

/* MAIN */

.main{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* TOPBAR */

.topbar{
  height:80px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 24px;

  border-bottom:1px solid var(--line);

  background:rgba(15,23,42,.72);

  backdrop-filter:blur(18px);
}

.topbar h2{
  font-size:24px;
  font-weight:800;
}

.topbar p{
  margin-top:4px;
  color:var(--text3);
  font-size:13px;
}

.topbar-actions{
  display:flex;
  align-items:center;
  gap:12px;
}

/* NOTIFICATION */

.notif-btn{
  position:relative;

  width:52px;
  height:52px;

  border-radius:16px;

  background:rgba(255,255,255,.04);

  border:1px solid var(--line);

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;

  font-size:20px;

  transition:.2s;
}

.notif-btn:hover{
  background:rgba(255,255,255,.08);
}

.notif-badge{
  position:absolute;

  top:-6px;
  right:-6px;

  min-width:24px;
  height:24px;

  padding:0 6px;

  border-radius:999px;

  background:var(--danger);

  color:white;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:11px;
  font-weight:800;
}

/* CONTENT */

.content{
  flex:1;
  overflow:auto;
  padding:24px;
}

/* HERO */

.hero{
  background:
    linear-gradient(
      135deg,
      #7c3aed,
      #4f46e5
    );

  border-radius:28px;

  padding:30px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  gap:20px;

  margin-bottom:24px;

  box-shadow:var(--shadow);
}

.hero h3{
  font-size:28px;
  font-weight:800;
}

.hero p{
  margin-top:10px;
  color:rgba(255,255,255,.85);
  line-height:1.6;
}

.hero-icon{
  font-size:70px;
}

/* CARD */

.card{
  background:rgba(24,34,53,.92);

  border:1px solid var(--line);

  border-radius:24px;

  padding:22px;

  box-shadow:var(--shadow);
}

.card-header{
  display:flex;
  align-items:center;
  justify-content:space-between;

  margin-bottom:20px;
}

.card-title{
  font-size:18px;
  font-weight:800;
}

/* EMPLOYEE */

.employee-list{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.employee-card{
  background:rgba(255,255,255,.03);

  border:1px solid rgba(255,255,255,.05);

  border-radius:18px;

  padding:18px;

  transition:.2s;
}

.employee-card:hover{
  transform:translateY(-2px);
}

.employee-top{
  display:flex;
  justify-content:space-between;
  gap:14px;
}

.employee-name{
  font-size:18px;
  font-weight:800;
}

.employee-phone{
  margin-top:6px;
  color:var(--text3);
  font-size:13px;
}

.employee-salary{
  font-size:15px;
  font-weight:700;
  color:#a78bfa;
}

.employee-grid{
  margin-top:18px;

  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

.info-box{
  background:rgba(255,255,255,.03);

  border-radius:14px;

  padding:12px;
}

.info-label{
  color:var(--text3);
  font-size:11px;
}

.info-value{
  margin-top:5px;
  font-size:14px;
  font-weight:700;
}

.employee-actions{
  margin-top:18px;

  display:flex;
  gap:10px;
}

.btn-secondary{
  background:rgba(255,255,255,.06);
}

.btn-danger{
  background:rgba(239,68,68,.18);
}

/* EMPTY */

.empty{
  text-align:center;
  padding:70px 20px;
}

.empty-icon{
  font-size:60px;
}

.empty h3{
  margin-top:18px;
  font-size:22px;
}

.empty p{
  margin-top:8px;
  color:var(--text3);
}

/* MODAL */

.modal-overlay{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,.6);

  display:none;
  align-items:center;
  justify-content:center;

  padding:20px;

  z-index:999;
}

.modal-overlay.show{
  display:flex;
}

.modal{
  width:100%;
  max-width:520px;

  background:#182235;

  border:1px solid var(--line);

  border-radius:28px;

  overflow:hidden;

  box-shadow:var(--shadow);
}

.modal-header{
  padding:24px;

  border-bottom:1px solid var(--line);
}

.modal-header h3{
  font-size:22px;
}

.modal-body{
  padding:24px;
}

.modal-footer{
  padding:24px;

  border-top:1px solid var(--line);

  display:flex;
  gap:12px;
  justify-content:flex-end;
}

/* FORM */

.form-group{
  margin-bottom:18px;
}

.form-label{
  display:block;

  margin-bottom:8px;

  font-size:13px;
  font-weight:700;
}

.input{
  width:100%;

  background:#0f172a;

  border:1px solid #334155;

  color:white;

  padding:14px;

  border-radius:14px;

  font-size:14px;
}

.input:focus{
  outline:none;
  border-color:#8b5cf6;
}

/* CONTRACT ALERT */

.alert-item{
  background:rgba(239,68,68,.12);

  border:1px solid rgba(239,68,68,.22);

  border-radius:16px;

  padding:16px;

  margin-bottom:12px;
}

.alert-name{
  font-weight:800;
}

.alert-sub{
  margin-top:6px;
  color:#fecaca;
  font-size:13px;
}

/* MOBILE */

@media(max-width:900px){

  .app{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    height:auto;
    border-right:none;
    border-bottom:1px solid var(--line);
  }

  .outlet-list{
    display:flex;
    overflow:auto;
    gap:10px;
    padding:14px;
  }

  .outlet-item{
    min-width:220px;
    margin-bottom:0;
  }

  .topbar{
    padding:0 16px;
  }

  .content{
    padding:16px;
  }

  .hero{
    flex-direction:column;
    text-align:center;
  }

  .employee-grid{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div class="logo">
      <h1>🏢 Naruna HR</h1>
      <p>Monitoring kontrak karyawan</p>
    </div>

    <div class="sidebar-top">
      <button
        class="btn btn-full"
        onclick="openOutletModal()"
      >
        + Tambah Outlet
      </button>
    </div>

    <div
      class="outlet-list"
      id="outletList"
    ></div>

  </aside>

  <!-- MAIN -->

  <main class="main">

    <!-- TOPBAR -->

    <div class="topbar">

      <div>
        <h2 id="pageTitle">
          Dashboard
        </h2>

        <p>
          Kelola kontrak kerja seluruh outlet
        </p>
      </div>

      <div class="topbar-actions">

        <div
          class="notif-btn"
          onclick="openReminderModal()"
        >
          🔔

          <div
            class="notif-badge"
            id="notifBadge"
            style="display:none"
          >
            0
          </div>

        </div>

        <button
          class="btn"
          onclick="openEmployeeModal()"
        >
          + Karyawan
        </button>

      </div>

    </div>

    <!-- CONTENT -->

    <div class="content">

      <div class="hero">

        <div>
          <h3>
            Sistem Monitoring Kontrak
          </h3>

          <p>
            Pantau masa kontrak seluruh
            karyawan secara otomatis,
            urut per outlet dan alfabet.
          </p>
        </div>

        <div class="hero-icon">
          📋
        </div>

      </div>

      <div class="card">

        <div class="card-header">

          <div class="card-title">
            Daftar Karyawan
          </div>

        </div>

        <div
          class="employee-list"
          id="employeeList"
        ></div>

      </div>

    </div>

  </main>

</div>

<!-- MODAL OUTLET -->

<div
  class="modal-overlay"
  id="outletModal"
>

  <div class="modal">

    <div class="modal-header">
      <h3>Tambah Outlet</h3>
    </div>

    <div class="modal-body">

      <div class="form-group">

        <label class="form-label">
          Nama Outlet
        </label>

        <input
          type="text"
          id="outletName"
          class="input"
          placeholder="Contoh: Outlet Semarang"
        >

      </div>

    </div>

    <div class="modal-footer">

      <button
        class="btn btn-secondary"
        onclick="closeModal('outletModal')"
      >
        Batal
      </button>

      <button
        class="btn"
        onclick="saveOutlet()"
      >
        Simpan
      </button>

    </div>

  </div>

</div>

<!-- MODAL EMPLOYEE -->

<div
  class="modal-overlay"
  id="employeeModal"
>

  <div class="modal">

    <div class="modal-header">
      <h3>Tambah Karyawan</h3>
    </div>

    <div class="modal-body">

      <div class="form-group">

        <label class="form-label">
          Nama
        </label>

        <input
          type="text"
          id="employeeName"
          class="input"
        >

      </div>

      <div class="form-group">

        <label class="form-label">
          Nomor HP
        </label>

        <input
          type="text"
          id="employeePhone"
          class="input"
        >

      </div>

      <div class="form-group">

        <label class="form-label">
          Gaji Pokok
        </label>

        <input
          type="number"
          id="employeeSalary"
          class="input"
        >

      </div>

      <div class="form-group">

        <label class="form-label">
          Start Kontrak
        </label>

        <input
          type="date"
          id="employeeStart"
          class="input"
        >

      </div>

      <div class="form-group">

        <label class="form-label">
          Akhir Kontrak
        </label>

        <input
          type="date"
          id="employeeEnd"
          class="input"
        >

      </div>

    </div>

    <div class="modal-footer">

      <button
        class="btn btn-secondary"
        onclick="closeModal('employeeModal')"
      >
        Batal
      </button>

      <button
        class="btn"
        onclick="saveEmployee()"
      >
        Simpan
      </button>

    </div>

  </div>

</div>

<!-- MODAL REMINDER -->

<div
  class="modal-overlay"
  id="reminderModal"
>

  <div class="modal">

    <div class="modal-header">
      <h3>Kontrak Akan Habis</h3>
    </div>

    <div
      class="modal-body"
      id="reminderList"
    ></div>

    <div class="modal-footer">

      <button
        class="btn"
        onclick="closeModal('reminderModal')"
      >
        Tutup
      </button>

    </div>

  </div>

</div>

<script>

/* STORAGE */

const DB_KEY =
  'naruna_hr_simple_v1';

/* STATE */

let state = {
  outlets:[],
  employees:[]
};

let selectedOutletId = null;

/* LOAD */

function loadData(){

  const data =
    localStorage.getItem(DB_KEY);

  if(data){

    state = JSON.parse(data);

  }

}

/* SAVE */

function saveData(){

  localStorage.setItem(
    DB_KEY,
    JSON.stringify(state)
  );

}

/* MODAL */

function openModal(id){

  document
    .getElementById(id)
    .classList
    .add('show');

}

function closeModal(id){

  document
    .getElementById(id)
    .classList
    .remove('show');

}

function openOutletModal(){

  openModal('outletModal');

}

function openEmployeeModal(){

  if(!selectedOutletId){

    alert(
      'Pilih outlet terlebih dahulu'
    );

    return;

  }

  openModal('employeeModal');

}

function openReminderModal(){

  renderReminder();

  openModal('reminderModal');

}

/* OUTLET */

function saveOutlet(){

  const name =
    document
      .getElementById(
        'outletName'
      )
      .value
      .trim();

  if(!name){

    alert('Nama outlet wajib');

    return;

  }

  state.outlets.push({
    id:Date.now().toString(),
    name
  });

  saveData();

  renderOutlets();

  closeModal('outletModal');

  document
    .getElementById(
      'outletName'
    )
    .value='';

}

/* EMPLOYEE */

function saveEmployee(){

  const employee = {

    id:Date.now().toString(),

    outletId:selectedOutletId,

    name:
      document
        .getElementById(
          'employeeName'
        )
        .value
        .trim(),

    phone:
      document
        .getElementById(
          'employeePhone'
        )
        .value
        .trim(),

    salary:
      document
        .getElementById(
          'employeeSalary'
        )
        .value,

    contractStart:
      document
        .getElementById(
          'employeeStart'
        )
        .value,

    contractEnd:
      document
        .getElementById(
          'employeeEnd'
        )
        .value

  };

  if(
    !employee.name ||
    !employee.contractEnd
  ){

    alert(
      'Lengkapi data karyawan'
    );

    return;

  }

  state.employees.push(employee);

  saveData();

  renderEmployees();

  updateReminder();

  closeModal('employeeModal');

}

/* RENDER OUTLET */

function renderOutlets(){

  const list =
    document
      .getElementById(
        'outletList'
      );

  list.innerHTML='';

  if(
    state.outlets.length === 0
  ){

    list.innerHTML=`
      <div
        style="
          color:#94a3b8;
          padding:20px;
          font-size:13px;
        "
      >
        Belum ada outlet
      </div>
    `;

    return;

  }

  state.outlets
    .sort((a,b)=>
      a.name.localeCompare(b.name)
    )
    .forEach(outlet=>{

      const total =
        state.employees.filter(
          e=>e.outletId===outlet.id
        ).length;

      const div =
        document.createElement(
          'div'
        );

      div.className =
        `
        outlet-item
        ${
          selectedOutletId===
          outlet.id
          ? 'active'
          : ''
        }
        `;

      div.innerHTML=`
        <div class="outlet-name">
          ${outlet.name}
        </div>

        <div class="outlet-sub">
          ${total} karyawan
        </div>
      `;

      div.onclick=()=>{

        selectedOutletId =
          outlet.id;

        renderOutlets();

        renderEmployees();

      };

      list.appendChild(div);

    });

}

/* RENDER EMPLOYEE */

function renderEmployees(){

  const container =
    document
      .getElementById(
        'employeeList'
      );

  if(!selectedOutletId){

    container.innerHTML=`
      <div class="empty">

        <div class="empty-icon">
          🏢
        </div>

        <h3>
          Pilih Outlet
        </h3>

        <p>
          Pilih outlet untuk melihat
          data karyawan
        </p>

      </div>
    `;

    return;

  }

  const employees =
    state.employees
      .filter(
        e=>
          e.outletId===
          selectedOutletId
      )
      .sort((a,b)=>
        a.name.localeCompare(b.name)
      );

  if(employees.length===0){

    container.innerHTML=`
      <div class="empty">

        <div class="empty-icon">
          👤
        </div>

        <h3>
          Belum Ada Karyawan
        </h3>

        <p>
          Tambahkan karyawan pertama
        </p>

      </div>
    `;

    return;

  }

  container.innerHTML='';

  employees.forEach(emp=>{

    const card =
      document.createElement(
        'div'
      );

    card.className='employee-card';

    card.innerHTML=`

      <div class="employee-top">

        <div>

          <div class="employee-name">
            ${emp.name}
          </div>

          <div class="employee-phone">
            ${emp.phone || '-'}
          </div>

        </div>

        <div class="employee-salary">
          Rp ${Number(emp.salary)
            .toLocaleString('id-ID')}
        </div>

      </div>

      <div class="employee-grid">

        <div class="info-box">

          <div class="info-label">
            START KONTRAK
          </div>

          <div class="info-value">
            ${formatDate(
              emp.contractStart
            )}
          </div>

        </div>

        <div class="info-box">

          <div class="info-label">
            AKHIR KONTRAK
          </div>

          <div class="info-value">
            ${formatDate(
              emp.contractEnd
            )}
          </div>

        </div>

      </div>

    `;

    container.appendChild(card);

  });

}

/* REMINDER */

function updateReminder(){

  const badge =
    document
      .getElementById(
        'notifBadge'
      );

  const reminder =
    getReminderEmployees();

  if(reminder.length>0){

    badge.style.display='flex';

    badge.textContent =
      reminder.length;

  }else{

    badge.style.display='none';

  }

}

function getReminderEmployees(){

  return state.employees
    .filter(emp=>{

      const today =
        new Date();

      const end =
        new Date(
          emp.contractEnd
        );

      const diff =
        Math.ceil(
          (
            end - today
          ) /
          (
            1000*60*60*24
          )
        );

      return diff <= 30;

    })
    .sort((a,b)=>{

      const outletA =
        getOutletName(
          a.outletId
        );

      const outletB =
        getOutletName(
          b.outletId
        );

      if(outletA!==outletB){

        return outletA
          .localeCompare(outletB);

      }

      return a.name
        .localeCompare(b.name);

    });

}

function renderReminder(){

  const container =
    document
      .getElementById(
        'reminderList'
      );

  const reminder =
    getReminderEmployees();

  if(reminder.length===0){

    container.innerHTML=`
      <div class="empty">

        <div class="empty-icon">
          ✅
        </div>

        <h3>
          Tidak Ada Reminder
        </h3>

        <p>
          Semua kontrak masih aman
        </p>

      </div>
    `;

    return;

  }

  container.innerHTML='';

  reminder.forEach(emp=>{

    const days =
      getRemainingDays(
        emp.contractEnd
      );

    container.innerHTML += `

      <div class="alert-item">

        <div class="alert-name">
          ${emp.name}
        </div>

        <div class="alert-sub">

          ${getOutletName(
            emp.outletId
          )}

          •

          Kontrak habis
          ${days} hari lagi

        </div>

      </div>

    `;

  });

}

/* HELPERS */

function getOutletName(id){

  const outlet =
    state.outlets.find(
      o=>o.id===id
    );

  return outlet
    ? outlet.name
    : '-';

}

function formatDate(date){

  if(!date) return '-';

  return new Date(date)
    .toLocaleDateString(
      'id-ID'
    );

}

function getRemainingDays(date){

  const today =
    new Date();

  const end =
    new Date(date);

  return Math.ceil(
    (
      end - today
    ) /
    (
      1000*60*60*24
    )
  );

}
