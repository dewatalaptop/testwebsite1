<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Naruna Contract Monitor</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#0f1118;
  --bg2:#171b25;
  --card:#1d2230;
  --card2:#252b3d;

  --border:#31384f;

  --text:#edf1ff;
  --text2:#b8c0dd;
  --text3:#7f89ad;

  --accent:#7c6cff;
  --accent2:#6d5df6;

  --green:#22c55e;
  --yellow:#eab308;
  --red:#ef4444;

  --radius:18px;
  --shadow:0 10px 30px rgba(0,0,0,0.35);
}

body{
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(circle at top left,#232a42 0%,transparent 30%),
    radial-gradient(circle at bottom right,#1b2440 0%,transparent 30%),
    var(--bg);

  color:var(--text);
  min-height:100vh;
}

button,
input{
  font-family:'Inter',sans-serif;
}

.hidden{
  display:none !important;
}

/* TOPBAR */

.topbar{
  position:sticky;
  top:0;
  z-index:100;

  backdrop-filter:blur(14px);

  background:rgba(15,17,24,0.88);

  border-bottom:1px solid rgba(255,255,255,0.05);

  padding:16px 20px;

  display:flex;
  align-items:center;
  justify-content:space-between;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:44px;
  height:44px;

  border-radius:14px;

  background:linear-gradient(
    135deg,
    var(--accent),
    #9d91ff
  );

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:20px;
  font-weight:800;
}

.brand-title{
  font-size:20px;
  font-weight:800;
}

.brand-sub{
  font-size:12px;
  color:var(--text3);
  margin-top:2px;
}

.notif-btn{
  position:relative;

  background:var(--card);
  border:1px solid var(--border);

  width:52px;
  height:52px;

  border-radius:16px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:22px;

  cursor:pointer;

  transition:0.2s;
}

.notif-btn:hover{
  transform:translateY(-2px);
  background:var(--card2);
}

.notif-count{
  position:absolute;

  top:-6px;
  right:-6px;

  background:var(--red);
  color:#fff;

  min-width:22px;
  height:22px;

  border-radius:999px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:11px;
  font-weight:700;

  padding:0 6px;
}

/* WRAPPER */

.wrapper{
  max-width:1400px;
  margin:auto;
  padding:24px;
}

/* HERO */

.hero{
  background:
    linear-gradient(
      135deg,
      rgba(124,108,255,0.25),
      rgba(124,108,255,0.05)
    );

  border:1px solid rgba(124,108,255,0.18);

  border-radius:30px;

  padding:32px;

  margin-bottom:24px;

  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.hero h1{
  font-size:34px;
  font-weight:800;
  line-height:1.15;
}

.hero p{
  color:var(--text2);
  margin-top:10px;
  max-width:700px;
}

.hero-badge{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);

  padding:14px 18px;

  border-radius:18px;

  font-size:14px;
}

/* ACTIONS */

.actions{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:24px;
}

.btn{
  border:none;
  cursor:pointer;

  border-radius:16px;

  padding:14px 18px;

  font-weight:600;

  transition:0.2s;
}

.btn:hover{
  transform:translateY(-2px);
}

.btn-primary{
  background:linear-gradient(
    135deg,
    var(--accent),
    var(--accent2)
  );

  color:#fff;
}

.btn-secondary{
  background:var(--card);
  color:var(--text);

  border:1px solid var(--border);
}

/* OUTLETS */

.outlet-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.outlet-card{
  background:rgba(29,34,48,0.88);

  border:1px solid rgba(255,255,255,0.05);

  border-radius:28px;

  padding:22px;

  box-shadow:var(--shadow);

  transition:0.2s;
}

.outlet-card:hover{
  transform:translateY(-4px);
}

.outlet-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
}

.outlet-name{
  font-size:20px;
  font-weight:700;
}

.outlet-total{
  color:var(--text3);
  font-size:13px;
  margin-top:6px;
}

.outlet-actions{
  display:flex;
  gap:8px;
}

.icon-btn{
  width:40px;
  height:40px;

  border:none;
  cursor:pointer;

  border-radius:12px;

  background:var(--card2);
  color:var(--text);

  transition:0.2s;
}

.icon-btn:hover{
  background:var(--accent);
}

.employee-list{
  margin-top:20px;

  display:flex;
  flex-direction:column;
  gap:12px;
}

.employee-item{
  background:rgba(255,255,255,0.03);

  border:1px solid rgba(255,255,255,0.05);

  border-radius:18px;

  padding:16px;
}

.employee-name{
  font-size:16px;
  font-weight:700;
}

.employee-phone{
  font-size:13px;
  color:var(--text3);
  margin-top:4px;
}

.employee-salary{
  margin-top:10px;
  color:#9fd6ff;
  font-weight:600;
}

.contract-box{
  margin-top:14px;

  padding:12px;

  border-radius:14px;

  background:rgba(255,255,255,0.03);
}

.contract-dates{
  font-size:13px;
  color:var(--text2);
  line-height:1.6;
}

.contract-status{
  margin-top:10px;

  display:inline-flex;
  align-items:center;

  padding:7px 12px;

  border-radius:999px;

  font-size:12px;
  font-weight:700;
}

.status-safe{
  background:rgba(34,197,94,0.15);
  color:var(--green);
}

.status-warning{
  background:rgba(234,179,8,0.15);
  color:var(--yellow);
}

.status-danger{
  background:rgba(239,68,68,0.15);
  color:var(--red);
}

.employee-actions{
  display:flex;
  gap:10px;
  margin-top:14px;
}

/* MODAL */

.modal-wrap{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,0.65);

  display:flex;
  align-items:center;
  justify-content:center;

  padding:20px;

  z-index:999;

  backdrop-filter:blur(5px);
}

.modal{
  width:100%;
  max-width:560px;

  background:var(--bg2);

  border:1px solid var(--border);

  border-radius:28px;

  overflow:hidden;
}

.modal-header{
  padding:22px 24px;

  border-bottom:1px solid rgba(255,255,255,0.06);

  display:flex;
  justify-content:space-between;
  align-items:center;
}

.modal-title{
  font-size:22px;
  font-weight:800;
}

.modal-body{
  padding:24px;
}

.form-group{
  margin-bottom:18px;
}

.label{
  display:block;
  margin-bottom:8px;

  font-size:13px;
  color:var(--text2);
}

.input{
  width:100%;

  background:var(--card);

  border:1px solid var(--border);

  color:var(--text);

  border-radius:16px;

  padding:14px 16px;

  outline:none;
}

.input:focus{
  border-color:var(--accent);
}

.modal-footer{
  padding:24px;

  display:flex;
  gap:12px;
  justify-content:flex-end;
}

/* NOTIFICATION PANEL */

.notification-panel{
  position:fixed;

  top:90px;
  right:20px;

  width:380px;
  max-height:70vh;

  overflow:auto;

  background:var(--bg2);

  border:1px solid var(--border);

  border-radius:24px;

  box-shadow:var(--shadow);

  z-index:998;

  padding:18px;
}

.notification-title{
  font-size:18px;
  font-weight:800;
  margin-bottom:16px;
}

.notif-item{
  background:rgba(255,255,255,0.04);

  border:1px solid rgba(255,255,255,0.05);

  border-radius:18px;

  padding:16px;

  margin-bottom:12px;
}

.notif-item:last-child{
  margin-bottom:0;
}

.notif-name{
  font-weight:700;
}

.notif-outlet{
  color:var(--text3);
  font-size:13px;
  margin-top:4px;
}

.notif-expire{
  margin-top:10px;

  color:var(--yellow);

  font-size:13px;
  font-weight:700;
}

.empty{
  text-align:center;
  color:var(--text3);
  padding:30px;
}

@media(max-width:768px){

  .wrapper{
    padding:16px;
  }

  .hero{
    padding:24px;
  }

  .hero h1{
    font-size:26px;
  }

  .notification-panel{
    width:calc(100vw - 32px);
    right:16px;
  }

}

</style>
</head>
<body>

<div class="topbar">

  <div class="brand">

    <div class="logo">
      🧾
    </div>

    <div>
      <div class="brand-title">
        Naruna Contract Monitor
      </div>

      <div class="brand-sub">
        Monitoring kontrak karyawan seluruh outlet
      </div>
    </div>

  </div>

  <button
    class="notif-btn"
    id="notifBtn"
  >
    🔔

    <div
      class="notif-count hidden"
      id="notifCount"
    >
      0
    </div>

  </button>

</div>

<div class="wrapper">

  <div class="hero">

    <div>

      <h1>
        Monitoring Kontrak Karyawan
        Jadi Lebih Mudah
      </h1>

      <p>
        Tambahkan outlet, kelola karyawan,
        dan dapatkan notifikasi otomatis
        saat kontrak hampir habis.
      </p>

    </div>

    <div class="hero-badge">
      Data tersimpan aman di device menggunakan IndexedDB
    </div>

  </div>

  <div class="actions">

    <button
      class="btn btn-primary"
      id="addOutletBtn"
    >
      ➕ Tambah Outlet
    </button>

    <button
      class="btn btn-secondary"
      id="exportBtn"
    >
      💾 Backup Data
    </button>

    <button
      class="btn btn-secondary"
      id="importBtn"
    >
      📂 Restore Data
    </button>

    <input
      type="file"
      id="importFile"
      class="hidden"
      accept=".json"
    >

  </div>

  <div
    class="outlet-grid"
    id="outletGrid"
  ></div>

</div>

<!-- MODAL -->

<div
  class="modal-wrap hidden"
  id="modalWrap"
>

  <div class="modal">

    <div class="modal-header">

      <div
        class="modal-title"
        id="modalTitle"
      >
      </div>

      <button
        class="icon-btn"
        id="closeModal"
      >
        ✕
      </button>

    </div>

    <div
      class="modal-body"
      id="modalBody"
    >
    </div>

    <div class="modal-footer">

      <button
        class="btn btn-secondary"
        id="cancelModal"
      >
        Batal
      </button>

      <button
        class="btn btn-primary"
        id="saveModal"
      >
        Simpan
      </button>

    </div>

  </div>

</div>

<!-- NOTIFICATION -->

<div
  class="notification-panel hidden"
  id="notifPanel"
>

  <div class="notification-title">
    Kontrak Akan Berakhir
  </div>

  <div id="notifList"></div>

</div>

<script>

/* =====================================================
INDEXED DB
===================================================== */

const DB_NAME = 'naruna_contract_monitor';
const STORE_NAME = 'app_data';

let db = null;

function openDB(){

  return new Promise((resolve,reject)=>{

    const request =
      indexedDB.open(DB_NAME,1);

    request.onupgradeneeded = e=>{

      db = e.target.result;

      if(
        !db.objectStoreNames.contains(
          STORE_NAME
        )
      ){

        db.createObjectStore(
          STORE_NAME,
          { keyPath:'key' }
        );

      }

    };

    request.onsuccess = e=>{

      db = e.target.result;
      resolve();

    };

    request.onerror = e=>{

      reject(e);

    };

  });

}

function saveData(data){

  return new Promise((resolve,reject)=>{

    const tx =
      db.transaction(
        STORE_NAME,
        'readwrite'
      );

    const store =
      tx.objectStore(STORE_NAME);

    store.put({
      key:'main',
      value:data
    });

    tx.oncomplete = ()=>resolve();

    tx.onerror = err=>reject(err);

  });

}

function loadData(){

  return new Promise((resolve,reject)=>{

    const tx =
      db.transaction(
        STORE_NAME,
        'readonly'
      );

    const store =
      tx.objectStore(STORE_NAME);

    const req =
      store.get('main');

    req.onsuccess = ()=>{

      resolve(
        req.result
          ? req.result.value
          : {
              outlets:[]
            }
      );

    };

    req.onerror = err=>reject(err);

  });

}

/* =====================================================
STATE
===================================================== */

let state = {
  outlets:[]
};

/* =====================================================
ELEMENTS
===================================================== */

const outletGrid =
  document.getElementById(
    'outletGrid'
  );

const modalWrap =
  document.getElementById(
    'modalWrap'
  );

const modalTitle =
  document.getElementById(
    'modalTitle'
  );

const modalBody =
  document.getElementById(
    'modalBody'
  );

const saveModal =
  document.getElementById(
    'saveModal'
  );

const notifBtn =
  document.getElementById(
    'notifBtn'
  );

const notifPanel =
  document.getElementById(
    'notifPanel'
  );

const notifCount =
  document.getElementById(
    'notifCount'
  );

const notifList =
  document.getElementById(
    'notifList'
  );

/* =====================================================
HELPERS
===================================================== */

function id(){

  return (
    Date.now() +
    Math.random()
      .toString(36)
      .slice(2,7)
  );

}

function formatDate(date){

  return new Date(date)
    .toLocaleDateString(
      'id-ID'
    );

}

function currency(num){

  return new Intl.NumberFormat(
    'id-ID',
    {
      style:'currency',
      currency:'IDR',
      maximumFractionDigits:0
    }
  ).format(num || 0);

}

function daysLeft(date){

  const now = new Date();

  now.setHours(0,0,0,0);

  const end = new Date(date);

  end.setHours(0,0,0,0);

  return Math.ceil(
    (
      end - now
    ) / (1000*60*60*24)
  );

}

/* =====================================================
SAVE
===================================================== */

async function persist(){

  await saveData(state);

}

/* =====================================================
RENDER
===================================================== */

function render(){

  renderOutlets();
  renderNotifications();

}

function renderOutlets(){

  outletGrid.innerHTML = '';

  if(
    !state.outlets.length
  ){

    outletGrid.innerHTML = `
      <div class="empty">
        Belum ada outlet
      </div>
    `;

    return;

  }

  state.outlets
    .sort((a,b)=>
      a.name.localeCompare(b.name)
    )
    .forEach(outlet=>{

      const div =
        document.createElement('div');

      div.className =
        'outlet-card';

      const employees =
        outlet.employees || [];

      div.innerHTML = `
        <div class="outlet-top">

          <div>

            <div class="outlet-name">
              ${outlet.name}
            </div>

            <div class="outlet-total">
              ${employees.length}
              karyawan
            </div>

          </div>

          <div class="outlet-actions">

            <button
              class="icon-btn"
              onclick="editOutlet('${outlet.id}')"
            >
              ✏️
            </button>

            <button
              class="icon-btn"
              onclick="removeOutlet('${outlet.id}')"
            >
              🗑️
            </button>

          </div>

        </div>

        <div class="employee-list">

          ${
            employees.length
            ? employees
              .sort((a,b)=>
                a.name.localeCompare(b.name)
              )
              .map(emp=>{

                const left =
                  daysLeft(emp.end);

                let status =
                  'Aman';

                let statusClass =
                  'status-safe';

                if(
                  left <= 30 &&
                  left >= 0
                ){

                  status =
                    `Habis ${left} hari lagi`;

                  statusClass =
                    'status-warning';

                }

                if(left < 0){

                  status =
                    'Kontrak Habis';

                  statusClass =
                    'status-danger';

                }

                return `
                  <div class="employee-item">

                    <div class="employee-name">
                      ${emp.name}
                    </div>

                    <div class="employee-phone">
                      ${emp.phone}
                    </div>

                    <div class="employee-salary">
                      ${currency(emp.salary)}
                    </div>

                    <div class="contract-box">

                      <div class="contract-dates">
                        Mulai:
                        ${formatDate(emp.start)}
                        <br>
                        Berakhir:
                        ${formatDate(emp.end)}
                      </div>

                      <div class="
                        contract-status
                        ${statusClass}
                      ">
                        ${status}
                      </div>

                    </div>

                    <div class="employee-actions">

                      <button
                        class="btn btn-secondary"
                        onclick="editEmployee(
                          '${outlet.id}',
                          '${emp.id}'
                        )"
                      >
                        Edit
                      </button>

                      <button
                        class="btn btn-secondary"
                        onclick="removeEmployee(
                          '${outlet.id}',
                          '${emp.id}'
                        )"
                      >
                        Hapus
                      </button>

                    </div>

                  </div>
                `;

              }).join('')
            : `
              <div class="empty">
                Belum ada karyawan
              </div>
            `
          }

        </div>

        <div style="margin-top:18px">

          <button
            class="btn btn-primary"
            onclick="openEmployeeModal(
              '${outlet.id}'
            )"
          >
            ➕ Tambah Karyawan
          </button>

        </div>
      `;

      outletGrid.appendChild(div);

    });

}

/* =====================================================
NOTIFICATION
===================================================== */

function renderNotifications(){

  let list = [];

  state.outlets.forEach(outlet=>{

    (
      outlet.employees || []
    ).forEach(emp=>{

      const left =
        daysLeft(emp.end);

      if(
        left >= 0 &&
        left <= 30
      ){

        list.push({
          outlet:outlet.name,
          employee:emp.name,
          end:emp.end,
          left
        });

      }

    });

  });

  list.sort((a,b)=>{

    if(
      a.outlet !== b.outlet
    ){

      return a.outlet
        .localeCompare(b.outlet);

    }

    return a.employee
      .localeCompare(b.employee);

  });

  notifCount.textContent =
    list.length;

  notifCount.classList.toggle(
    'hidden',
    !list.length
  );

  notifList.innerHTML = '';

  if(!list.length){

    notifList.innerHTML = `
      <div class="empty">
        Tidak ada kontrak
        yang akan habis
      </div>
    `;

    return;

  }

  list.forEach(item=>{

    notifList.innerHTML += `
      <div class="notif-item">

        <div class="notif-name">
          ${item.employee}
        </div>

        <div class="notif-outlet">
          ${item.outlet}
        </div>

        <div class="notif-expire">
          Berakhir dalam
          ${item.left} hari
        </div>

      </div>
    `;

  });

}

notifBtn.onclick = ()=>{

  notifPanel.classList.toggle(
    'hidden'
  );

};

/* =====================================================
OUTLET
===================================================== */

document
  .getElementById(
    'addOutletBtn'
  )
  .onclick = ()=>{

    modalWrap.classList.remove(
      'hidden'
    );

    modalTitle.innerHTML =
      'Tambah Outlet';

    modalBody.innerHTML = `
      <div class="form-group">

        <label class="label">
          Nama Outlet
        </label>

        <input
          type="text"
          id="outletName"
          class="input"
          placeholder="Contoh: Naruna Semarang"
        >

      </div>
    `;

    saveModal.onclick =
      async ()=>{

        const name =
          document
            .getElementById(
              'outletName'
            )
            .value.trim();

        if(!name){

          alert(
            'Nama outlet wajib diisi'
          );

          return;

        }

        state.outlets.push({
          id:id(),
          name,
          employees:[]
        });

        await persist();

        render();

        closeModal();

      };

  };

async function removeOutlet(idOutlet){

  if(
    !confirm(
      'Hapus outlet beserta seluruh karyawan?'
    )
  ) return;

  state.outlets =
    state.outlets.filter(
      o=>o.id !== idOutlet
    );

  await persist();

  render();

}

function editOutlet(idOutlet){

  const outlet =
    state.outlets.find(
      o=>o.id === idOutlet
    );

  if(!outlet) return;

  modalWrap.classList.remove(
    'hidden'
  );

  modalTitle.innerHTML =
    'Edit Outlet';

  modalBody.innerHTML = `
    <div class="form-group">

      <label class="label">
        Nama Outlet
      </label>

      <input
        type="text"
        id="outletName"
        class="input"
        value="${outlet.name}"
      >

    </div>
  `;

  saveModal.onclick =
    async ()=>{

      const name =
        document
          .getElementById(
            'outletName'
          )
          .value.trim();

      if(!name){

        alert(
          'Nama outlet wajib diisi'
        );

        return;

      }

      outlet.name = name;

      await persist();

      render();

      closeModal();

    };

}

async function removeEmployee(
  outletId,
  empId
){

  if(
    !confirm(
      'Hapus karyawan ini?'
    )
  ) return;

  const outlet =
    state.outlets.find(
      o=>o.id === outletId
    );

  outlet.employees =
    outlet.employees.filter(
      e=>e.id !== empId
    );

  await persist();

  render();

}

/* =====================================================
EXPORT IMPORT
===================================================== */

document
  .getElementById(
    'exportBtn'
  )
  .onclick = ()=>{

    const blob =
      new Blob(
        [
          JSON.stringify(
            state,
            null,
            2
          )
        ],
        {
          type:'application/json'
        }
      );

    const a =
      document.createElement('a');

    a.href =
      URL.createObjectURL(blob);

    a.download =
      'naruna-backup.json';

    a.click();

  };

document
  .getElementById(
    'importBtn'
  )
  .onclick = ()=>{

    document
      .getElementById(
        'importFile'
      )
      .click();

  };

document
  .getElementById(
    'importFile'
  )
  .addEventListener(
    'change',
    async e=>{

      const file =
        e.target.files[0];

      if(!file) return;

      const text =
        await file.text();

      state =
        JSON.parse(text);

      await persist();

      render();

    }
  );

/* =====================================================
MODAL CLOSE
===================================================== */

function closeModal(){

  modalWrap.classList.add(
    'hidden'
  );

}

document
  .getElementById(
    'closeModal'
  )
  .onclick = closeModal;

document
  .getElementById(
    'cancelModal'
  )
  .onclick = closeModal;

/* =====================================================
INIT
===================================================== */

async function init(){

  await openDB();

  state = await loadData();

  render();

}

init();
