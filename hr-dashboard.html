<style>

/* =========================================================
RESET
========================================================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:'Inter',sans-serif;

  background:#f3f4f6;

  color:#111827;

}

/* =========================================================
VARIABLES
========================================================= */

:root{

  --primary:#4f46e5;

  --danger:#ef4444;

  --warning:#f59e0b;

  --success:#22c55e;

  --text:#111827;

  --muted:#6b7280;

  --border:#e5e7eb;

  --radius:22px;

  --shadow:
    0 10px 30px rgba(0,0,0,.05);

}

/* =========================================================
LAYOUT
========================================================= */

.app{

  display:flex;

  min-height:100vh;

}

/* =========================================================
SIDEBAR
========================================================= */

.sidebar{

  width:260px;

  background:#0f172a;

  color:white;

  position:fixed;

  top:0;
  left:0;
  bottom:0;

  padding:28px 18px;

}

.brand{

  margin-bottom:36px;

}

.brand h1{

  font-size:28px;

  font-weight:800;

}

.brand p{

  font-size:12px;

  color:#94a3b8;

  letter-spacing:3px;

  margin-top:4px;

}

.nav{

  display:flex;

  flex-direction:column;

  gap:8px;

}

.nav button{

  border:none;

  background:transparent;

  color:#cbd5e1;

  padding:14px 16px;

  border-radius:16px;

  text-align:left;

  font-weight:600;

  cursor:pointer;

  transition:.2s;

}

.nav button:hover,
.nav button.active{

  background:
    rgba(255,255,255,.08);

  color:white;

}

/* =========================================================
MAIN
========================================================= */

.main{

  margin-left:260px;

  width:100%;

  padding:32px;

}

/* =========================================================
TOPBAR
========================================================= */

.topbar{

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:20px;

  flex-wrap:wrap;

  margin-bottom:30px;

}

.topbar h2{

  font-size:32px;

  font-weight:800;

}

.topbar p{

  margin-top:6px;

  color:var(--muted);

}

.search{

  width:340px;

  background:white;

  border-radius:18px;

  border:1px solid var(--border);

  padding:14px 18px;

  box-shadow:var(--shadow);

}

.search input{

  width:100%;

  border:none;

  outline:none;

  background:none;

  font-size:14px;

}

/* =========================================================
STATS
========================================================= */

.stats{

  display:grid;

  grid-template-columns:
    repeat(
      auto-fit,
      minmax(220px,1fr)
    );

  gap:18px;

  margin-bottom:30px;

}

.card{

  background:white;

  border-radius:var(--radius);

  padding:24px;

  box-shadow:var(--shadow);

}

.card small{

  display:block;

  color:var(--muted);

  margin-bottom:10px;

}

.card h3{

  font-size:34px;

}

/* =========================================================
SECTION
========================================================= */

.section{

  margin-bottom:30px;

}

.section-header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:16px;

  flex-wrap:wrap;

  margin-bottom:20px;

}

.section-header h3{

  font-size:28px;

}

/* =========================================================
BUTTON
========================================================= */

.btn{

  border:none;

  background:var(--primary);

  color:white;

  padding:14px 18px;

  border-radius:16px;

  font-weight:700;

  cursor:pointer;

  transition:.2s;

}

.btn:hover{

  opacity:.94;

}

.btn:disabled{

  opacity:.5;

  cursor:not-allowed;

}

.btn.red{

  background:var(--danger);

}

.btn.gray{

  background:#e5e7eb;

  color:#111827;

}

/* =========================================================
GRID
========================================================= */

.grid{

  display:grid;

  grid-template-columns:
    repeat(
      auto-fit,
      minmax(300px,1fr)
    );

  gap:20px;

}

.company{

  background:white;

  border-radius:28px;

  padding:24px;

  box-shadow:var(--shadow);

}

.company h4{

  font-size:24px;

  margin-bottom:8px;

}

.company p{

  color:var(--muted);

  margin-bottom:16px;

  line-height:1.7;

}

.company-actions{

  display:flex;

  gap:10px;

  margin-top:18px;

}

.company-actions button{

  flex:1;

  border:none;

  padding:12px;

  border-radius:14px;

  font-weight:700;

  cursor:pointer;

}

.detail-btn{

  background:#eef2ff;

  color:#3730a3;

}

.delete-btn{

  background:#fee2e2;

  color:#991b1b;

}

/* =========================================================
BADGE
========================================================= */

.badge{

  display:inline-flex;

  padding:8px 12px;

  border-radius:999px;

  font-size:12px;

  font-weight:700;

}

.badge.warning{

  background:#fef3c7;

  color:#92400e;

}

.badge.safe{

  background:#dcfce7;

  color:#166534;

}
/* =========================================================
TABLE
========================================================= */
.table-wrap{

  overflow-x:auto;

  background:white;

  border-radius:24px;

  box-shadow:var(--shadow);

}

table{

  width:100%;

  border-collapse:collapse;

}

th{

  background:#f9fafb;

  padding:14px;

  text-align:left;

  font-size:13px;

  color:var(--muted);

  white-space:nowrap;

}

td{

  padding:14px;

  border-top:1px solid #f3f4f6;

  font-size:14px;

  vertical-align:middle;

}

/* =========================================================
STATUS
========================================================= */

.status{

  display:inline-flex;

  padding:8px 12px;

  border-radius:999px;

  font-size:12px;

  font-weight:700;

}

.status.safe{

  background:#dcfce7;

  color:#166534;

}

.status.warning{

  background:#fef3c7;

  color:#92400e;

}

.status.danger{

  background:#fee2e2;

  color:#991b1b;

}

/* =========================================================
MODAL
========================================================= */

.modal{

  position:fixed;

  inset:0;

  background:rgba(0,0,0,.45);

  display:none;

  align-items:center;

  justify-content:center;

  padding:20px;

  z-index:999;

}

.modal.show{

  display:flex;

}

.modal-box{

  width:100%;

  max-width:760px;

  background:white;

  border-radius:30px;

  padding:28px;

  max-height:90vh;

  overflow:auto;

}

.modal-header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:24px;

}

.close{

  width:42px;

  height:42px;

  border:none;

  border-radius:14px;

  background:#f3f4f6;

  cursor:pointer;

}

/* =========================================================
FORM
========================================================= */

.form-grid{

  display:grid;

  grid-template-columns:
    1fr 1fr;

  gap:18px;

}

.form-group{

  display:flex;

  flex-direction:column;

  gap:8px;

}

.form-group.full{

  grid-column:1/-1;

}

label{

  font-size:14px;

  font-weight:700;

}

input,
select,
textarea{

  border:1px solid var(--border);

  background:#f9fafb;

  border-radius:16px;

  padding:14px 16px;

  outline:none;

  font-family:inherit;

  font-size:14px;

}

textarea{

  resize:vertical;

  min-height:100px;

}

.form-submit{

  margin-top:20px;

  width:100%;

}

/* =========================================================
EMPTY
========================================================= */

.empty{

  background:white;

  border-radius:28px;

  padding:60px;

  text-align:center;

  box-shadow:var(--shadow);

}

.empty h3{

  font-size:28px;

  margin-bottom:10px;

}

.empty p{

  color:var(--muted);

}

/* =========================================================
RESPONSIVE
========================================================= */

@media(max-width:1000px){

  .sidebar{

    display:none;

  }

  .main{

    margin-left:0;

  }

}

@media(max-width:700px){

  .form-grid{

    grid-template-columns:1fr;

  }

  .search{

    width:100%;

  }

  .section-header{

    align-items:flex-start;

  }

}

</style>
</head>

<script>

/* =========================================================
STATE
========================================================= */

const AppState = {

  meta:{

    updatedAt:Date.now(),

    version:1

  },

  companies:[],

  employees:[]

};

/* =========================================================
UTILS
========================================================= */

const uid = () =>

  Date.now()
    .toString(36)

  +

  Math.random()
    .toString(36)
    .slice(2,6);

const esc = str =>

  String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');

const currency = number =>

  new Intl.NumberFormat(
    'id-ID',
    {
      style:'currency',
      currency:'IDR',
      maximumFractionDigits:0
    }
  ).format(number || 0);

const daysLeft = date => {

  if(!date) return null;

  const today = new Date();

  today.setHours(
    0,0,0,0
  );

  const [y,m,d] =
    date.split('-');

  const end = new Date(
    Number(y),
    Number(m)-1,
    Number(d)
  );

  end.setHours(
    0,0,0,0
  );

  return Math.ceil(
    (end - today)
    /
    86400000
  );

};

const contractStatus = date => {

  const days =
    daysLeft(date);

  if(days === null){

    return {
      label:'-',
      class:'safe'
    };

  }

  if(days < 0){

    return {
      label:'Expired',
      class:'danger'
    };

  }

  if(days <= 30){

    return {
      label:
        days + ' Hari',

      class:'warning'
    };

  }

  return {

    label:'Aman',

    class:'safe'

  };

};

const sortWeight = employee => {

  const days =
    daysLeft(
      employee.contract
    );

  if(days === null){

    return 999999;

  }

  if(days < 0){
  return -999999;
}
  return days;

};

/* =========================================================
STORAGE
========================================================= */

const Storage = {

  key:'naruna_hr',

  save(){

    AppState.meta.updatedAt =
      Date.now();

    localStorage.setItem(
      this.key,
      JSON.stringify(AppState)
    );

  },

  load(){

    try{

      const raw =
        localStorage.getItem(
          this.key
        );

      if(!raw) return;

      const data =
        JSON.parse(raw);

      if(
        typeof data !== 'object'
      ){

        return;

      }

      AppState.meta =
        data.meta || {

          updatedAt:Date.now(),

          version:1

        };

      AppState.companies =
        Array.isArray(
          data.companies
        )
        ?
        data.companies
        :
        [];

      AppState.employees =
        Array.isArray(
          data.employees
        )
        ?
        data.employees
        :
        [];

    }catch(error){

      console.error(
        'Storage load error:',
        error
      );

    }

  }

};

/* =========================================================
SAVE ALL
========================================================= */

async function saveAll(){

  Storage.save();

  /*
  await syncToFirebase();
  */

}

/* =========================================================
MODAL
========================================================= */

function openModal(id){

  document
    .getElementById(id)
    .classList
    .add('show');

  document.body.style.overflow =
    'hidden';

}

function closeModal(id){

  document
    .getElementById(id)
    .classList
    .remove('show');

  const activeModal =
    document.querySelector(
      '.modal.show'
    );

  if(!activeModal){

    document.body.style.overflow =
      '';

  }

}

/* =========================================================
BACKDROP CLOSE
========================================================= */

document
  .querySelectorAll('.modal')
  .forEach(modal => {

    modal.addEventListener(
      'click',
      event => {

        if(
          event.target === modal
        ){

          modal.classList.remove(
            'show'
          );

          const activeModal =
            document.querySelector(
              '.modal.show'
            );

          if(!activeModal){

            document.body.style.overflow =
              '';

          }

        }

      }
    );

  });

/* =========================================================
RENDER
========================================================= */

function render(){

  renderStats();

  renderCompanies();

  renderEmployees();

}

function renderStats(){

  document
    .getElementById(
      'totalEmployee'
    )
    .textContent =
      AppState.employees.length;

  document
    .getElementById(
      'totalCompany'
    )
    .textContent =
      AppState.companies.length;

  let payroll = 0;

  let warning = 0;

  AppState.employees
    .forEach(employee => {

      payroll +=
        Number(
          employee.salary
        ) || 0;

      const days =
        daysLeft(
          employee.contract
        );

      if(

        days !== null

        &&

        days <= 30

        &&

        days >= 0

      ){

        warning++;

      }

    });

  document
    .getElementById(
      'totalPayroll'
    )
    .textContent =
      currency(payroll);

  document
    .getElementById(
      'totalWarning'
    )
    .textContent =
      warning;

}

function renderCompanies(){

  const grid =
    document.getElementById(
      'companyGrid'
    );

  if(
    AppState.companies.length === 0
  ){

    grid.innerHTML = `

      <div class="empty">

        <h3>
          Belum Ada Anak Usaha
        </h3>

        <p>
          Tambahkan perusahaan pertama
        </p>

      </div>

    `;

    return;

  }

  let html = '';

  AppState.companies
    .forEach(company => {

      const employees =
        AppState.employees.filter(
          employee =>

            employee.companyId
            ===
            company.id
        );

      const warning =
        employees.filter(
          employee => {

            const days =
              daysLeft(
                employee.contract
              );

            return (

              days !== null

              &&

              days <= 30

              &&

              days >= 0

            );

          }
        ).length;

      html += `

        <div class="company">

          <h4>
            ${esc(company.name)}
          </h4>

          <p>
            ${esc(
              company.location
            )}
          </p>

          <span class="
            badge
            ${
              warning
              ?
              'warning'
              :
              'safe'
            }
          ">

            ${
              warning
              ?
              warning +
              ' kontrak'
              :
              'Semua aman'
            }

          </span>

          <div class="company-actions">

            <button
              class="detail-btn"
            >

              ${
                employees.length
              }

              Karyawan

            </button>

            <button
              class="delete-btn"
              onclick="
                deleteCompany(
                  '${company.id}'
                )
              "
            >

              Hapus

            </button>

          </div>

        </div>

      `;

    });

  grid.innerHTML = html;

  renderCompanyOptions();

}
function renderCompanyOptions(){

  const select =
    document.getElementById(
      'employeeCompany'
    );

  let html = '';

  AppState.companies
    .forEach(company => {

      html += `

        <option
          value="
            ${esc(company.id)}
          "
        >

          ${esc(company.name)}

        </option>

      `;

    });

  select.innerHTML = html;

}

function renderEmployees(){

  const tbody =
    document.getElementById(
      'employeeTable'
    );

  const keyword =
    document
      .getElementById(
        'searchInput'
      )
      .value
      .trim()
      .toLowerCase();

  const filtered =
    AppState.employees

      .filter(employee => {

        return (

          (
            employee.name || ''
          )

          .toLowerCase()

          .includes(keyword)

          ||

          (
            employee.position || ''
          )

          .toLowerCase()

          .includes(keyword)

        );

      })

      .sort(
        (a,b) =>
          sortWeight(a)
          -
          sortWeight(b)
      );

  if(filtered.length === 0){

    tbody.innerHTML = `

      <tr>

        <td
          colspan="7"
          style="
            text-align:center;
            padding:40px;
            color:#6b7280;
          "
        >

          Belum ada data

        </td>

      </tr>

    `;

    return;

  }

  let html = '';

  filtered.forEach(employee => {

    const company =
      AppState.companies.find(
        item =>

          item.id
          ===
          employee.companyId
      );

    const status =
      contractStatus(
        employee.contract
      );

    html += `

      <tr>

        <td>
          ${esc(employee.name)}
        </td>

        <td>
          ${esc(
            company?.name || '-'
          )}
        </td>

        <td>
          ${esc(
            employee.position
          )}
        </td>
        <td>
  ${esc(employee.status)}
</td>

        <td>
          ${
            employee.contract
            ?
            esc(employee.contract)
            :
            '-'
          }
        </td>

        <td>

          <span class="
            status
            ${status.class}
          ">

            ${status.label}

          </span>

        </td>

        <td>
          ${currency(
            employee.salary
          )}
        </td>

        <td>

          <button
            class="delete-btn"
            onclick="
              deleteEmployee(
                '${employee.id}'
              )
            "
          >

            Hapus

          </button>

        </td>

      </tr>

    `;

  });

  tbody.innerHTML = html;

}

/* =========================================================
COMPANY
========================================================= */

document
  .getElementById(
    'addCompanyBtn'
  )
  .addEventListener(
    'click',
    () =>
      openModal(
        'companyModal'
      )
  );

document
  .getElementById(
    'companyForm'
  )
  .addEventListener(
    'submit',
    async event => {

      event.preventDefault();

      const name =
        document
          .getElementById(
            'companyName'
          )
          .value
          .trim();

      if(!name){

        alert(
          'Nama perusahaan wajib diisi'
        );

        return;

      }

      const exists =
        AppState.companies.some(
          company =>

            (
              company.name || ''
            )

            .toLowerCase()

            ===

            name.toLowerCase()
        );

      if(exists){

        alert(
          'Nama perusahaan sudah ada'
        );

        return;

      }

      AppState.companies.push({

        id:uid(),

        updatedAt:Date.now(),

        name,

        location:
          document
            .getElementById(
              'companyLocation'
            )
            .value
            .trim(),

        description:
          document
            .getElementById(
              'companyDescription'
            )
            .value
            .trim()

      });

      await saveAll();

      render();

      closeModal(
        'companyModal'
      );

      event.target.reset();

    }
  );

function deleteCompany(id){

  if(
    !confirm(
      'Hapus perusahaan beserta seluruh karyawan?'
    )
  ){

    return;

  }

  AppState.companies =
    AppState.companies.filter(
      company =>
        company.id !== id
    );

  AppState.employees =
    AppState.employees.filter(
      employee =>
        employee.companyId !== id
    );

  saveAll();

  render();

}

/* =========================================================
EMPLOYEE
========================================================= */

document
  .getElementById(
    'addEmployeeBtn'
  )
  .addEventListener(
    'click',
    () => {

      if(
        AppState.companies.length === 0
      ){

        alert(
          'Tambahkan perusahaan terlebih dahulu'
        );

        return;

      }

      openModal(
        'employeeModal'
      );

    }
  );

document
  .getElementById(
    'employeeForm'
  )
  .addEventListener(
    'submit',
    async event => {

      event.preventDefault();

      const companyId =
        document
          .getElementById(
            'employeeCompany'
          )
          .value;

      const companyExists =
        AppState.companies.some(
          company =>
            company.id === companyId
        );

      if(!companyExists){

        alert(
          'Perusahaan tidak valid'
        );

        return;

      }

      const employeeName =
        document
          .getElementById(
            'employeeName'
          )
          .value
          .trim();

      if(!employeeName){

        alert(
          'Nama karyawan wajib diisi'
        );

        return;

      }

      AppState.employees.push({

        id:uid(),

        updatedAt:Date.now(),

        companyId,

        name:employeeName,

        position:
          document
            .getElementById(
              'employeePosition'
            )
            .value
            .trim(),

        status:
          document
            .getElementById(
              'employeeStatus'
            )
            .value,

        contract:
          document
            .getElementById(
              'employeeContract'
            )
            .value,

        salary:
          Number(
            document
              .getElementById(
                'employeeSalary'
              )
              .value
          ) || 0

      });

      await saveAll();

      render();

      closeModal(
        'employeeModal'
      );

      event.target.reset();

    }
  );

function deleteEmployee(id){

  if(
    !confirm(
      'Hapus karyawan?'
    )
  ){

    return;

  }

  AppState.employees =
    AppState.employees.filter(
      employee =>
        employee.id !== id
    );

  saveAll();

  render();

}

SEARCH
========================================================= */

document
  .getElementById(

  )
  .addEventListener(

  );

EXPORT EXCEL
========================================================= */

document
  .getElementById(
    'exportExcelBtn'
  )
  .addEventListener(

    exportExcel
  );

function exportExcel(){

  const rows =
    AppState.employees.map(
      employee => {

        const company =
          AppState.companies.find(
            item =>
              item.id ===
              employee.companyId
          );

        return {

          Nama:
            employee.name,

          Perusahaan:
            company?.name || '-',

          Jabatan:
            employee.position,

          Status:
            employee.status,

          Kontrak:
            employee.contract,

          Gaji:
            employee.salary

        };

      }
    );

  const worksheet =
    XLSX.utils.json_to_sheet(
      rows
    );

  const workbook =
    XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(
    workbook,
    worksheet,
    'Karyawan'
  );

  XLSX.writeFile(
    workbook,
    'naruna_hr.xlsx'
  );

}

/* =========================================================
EXPORT PDF
========================================================= */

document
  .getElementById(
    'exportPDFBtn'
  )
  .addEventListener(
    'click',
    exportPDF
  );

function exportPDF(){

  const {
    jsPDF
  } = window.jspdf;

  const doc =
    new jsPDF();

  if(!doc.autoTable){

    alert(
      'Plugin PDF gagal dimuat'
    );

    return;

  }

  const rows =
    AppState.employees.map(
      employee => {

        const company =
          AppState.companies.find(
            item =>
              item.id ===
              employee.companyId
          );

        return [

          employee.name,

          company?.name || '-',

          employee.position,

          employee.contract || '-',

          currency(
            employee.salary
          )

        ];

      }
    );

  doc.text(
    'Naruna HR Report',
    14,
    18
  );

  doc.autoTable({

    startY:26,

    head:[[
      'Nama',
      'Perusahaan',
      'Jabatan',
      'Kontrak',
      'Gaji'
    ]],

    body:rows

  });

  doc.save(
    'naruna_hr.pdf'
  );

}

/* =========================================================
EXPORT JSON
========================================================= */

document
  .getElementById(
    'exportJSONBtn'
  )
  .addEventListener(
    'click',
    exportJSON
  );

function exportJSON(){

  const data =
    JSON.stringify(
      AppState,
      null,
      2
    );

  const blob =
    new Blob(
      [data],
      {
        type:
          'application/json'
      }
    );

  const a =
    document.createElement(
      'a'
    );

  a.href =
    URL.createObjectURL(
      blob
    );

  a.download =
    'naruna_hr.json';

  document.body.appendChild(a);

  a.click();

  document.body.removeChild(a);

  URL.revokeObjectURL(
    a.href
  );

}

/* =========================================================
IMPORT JSON
========================================================= */

document
  .getElementById(
    'importJSONInput'
  )
  .addEventListener(
    'change',
    importJSON
  );

function importJSON(event){

  const file =
    event.target.files[0];

  if(!file){

    return;

  }

  const reader =
    new FileReader();

  reader.onload = async e => {

    try{

      const data =
        JSON.parse(
          e.target.result
        );

      if(

        !Array.isArray(
          data.companies
        )

        ||

        !Array.isArray(
          data.employees
        )

      ){

        alert(
          'Format JSON tidak valid'
        );

        return;

      }

      AppState.meta =
        data.meta || {

          updatedAt:Date.now(),

          version:1

        };

      AppState.companies =
        data.companies;

      AppState.employees =
        data.employees;

      await saveAll();

      render();

      alert(
        'Data berhasil diimport'
      );

    }catch(error){

      console.error(error);

      alert(
        'Gagal import JSON'
      );

    }

    event.target.value = '';

  };

  reader.readAsText(file);

}
