<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dolan Sawah · Ops Pro</title>

<style>
:root{
  --bg:#111410;
  --bg2:#191c17;
  --surface:#252922;
  --acc:#7CDB6A;
  --text:#E8EDE5;
  --text2:#9BA696;
  --border:#2a2f27;
  --r:10px;
  --nav:62px;
}

/* RESET */
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* APP CONTAINER */
#app{
  max-width:480px;
  margin:auto;
  min-height:100vh;
}

/* NAVIGATION */
#bnav{
  position:fixed;
  bottom:0;
  width:100%;
  max-width:480px;
  height:var(--nav);
  background:var(--bg2);
  display:flex;
  border-top:1px solid var(--border);
  z-index:10;
}

.nb{
  flex:1;
  border:none;
  background:none;
  color:var(--text2);
  font-size:11px;
}

.nb.active{
  color:var(--acc);
}

/* TAB */
.tab{
  display:none;
  padding:12px 12px 80px;
}

.tab.active{
  display:block;
}

/* CARD */
.card{
  background:var(--surface);
  padding:12px;
  border-radius:var(--r);
  margin-bottom:10px;
}

/* INPUT */
.inp{
  width:100%;
  padding:10px;
  border-radius:6px;
  border:1px solid var(--border);
  background:#00000020;
  color:var(--text);
  margin-top:6px;
}

/* BUTTON */
.btn{
  padding:10px;
  border:none;
  border-radius:6px;
  background:var(--acc);
  color:#000;
  font-weight:bold;
  margin-top:8px;
  width:100%;
}

/* SMALL BUTTON */
.btn-sm{
  padding:6px;
  font-size:11px;
}

/* FLEX */
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:6px;
}

/* TITLE */
h2{
  margin-bottom:10px;
}

/* TEXT SMALL */
small{
  color:var(--text2);
}

/* TAG BUTTON */
.tag{
  background:var(--acc);
  color:#000;
  border:none;
  border-radius:6px;
  padding:5px 8px;
  font-size:11px;
}
</style>
</head>

<body>
<div id="app">

<!-- =========================
     NAVIGATION
========================= -->
<nav id="bnav">
  <button class="nb active" onclick="goTab('belanja',this)">Belanja</button>
  <button class="nb" onclick="goTab('penjualan',this)">Jual</button>
  <button class="nb" onclick="goTab('dashboard',this)">Dash</button>
  <button class="nb" onclick="goTab('admin',this)">Admin</button>
</nav>

<!-- =========================
     TAB BELANJA
========================= -->
<div id="tab-belanja" class="tab active">
  <h2>Belanja</h2>

  <textarea id="bulk" class="inp" placeholder="Contoh:
ayam 5 kg
cabai 2
minyak 1 liter"></textarea>

  <button class="btn" onclick="process()">Tambah</button>

  <!-- FAVORITE -->
  <div id="favorite-wrap"></div>

  <!-- LIST -->
  <div id="list"></div>
</div>

<!-- =========================
     TAB PENJUALAN
========================= -->
<div id="tab-penjualan" class="tab">
  <h2>Penjualan</h2>

  <textarea id="sale" class="inp" placeholder="Contoh:
ayam geprek 5 100000"></textarea>

  <button class="btn" onclick="processSale()">Tambah</button>

  <div id="sale-list"></div>
</div>

<!-- =========================
     TAB DASHBOARD
========================= -->
<div id="tab-dashboard" class="tab">
  <h2>Dashboard</h2>
  <div id="dash"></div>
</div>

<!-- =========================
     TAB ADMIN
========================= -->
<div id="tab-admin" class="tab">
  <h2>Admin</h2>

  <!-- CATEGORY -->
  <div class="card">
    <b>Kategori</b>
    <input id="new-cat" class="inp" placeholder="Tambah kategori">
    <button class="btn" onclick="addCat()">Tambah</button>
  </div>

  <div id="cats"></div>

  <!-- MASTER -->
  <div id="master-wrap"></div>

  <!-- UNKNOWN -->
  <div id="unknown-wrap"></div>

  <!-- TOOLS -->
  <div id="tools-wrap"></div>
</div>

<!-- =========================
     SCRIPT START
========================= -->
<script>
/* ================================
   NAVIGATION (SINGLE SOURCE)
================================ */
function goTab(tab, el){

  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.remove("active");
  });

  document.querySelectorAll(".nb").forEach(b=>{
    b.classList.remove("active");
  });

  document.getElementById("tab-" + tab).classList.add("active");
  el.classList.add("active");

  /* lazy render */
  if (tab === "belanja") renderList();
  if (tab === "penjualan") renderSales();
  if (tab === "dashboard") renderDashboard();
  if (tab === "admin") renderAdmin();
}

/* ================================
   STORAGE LAYER (SAFE)
================================ */
const DB_KEY = {
  categories: 'ds_categories',
  purchases: 'ds_purchases',
  sales: 'ds_sales',
  items: 'ds_items',
  usage_item: 'ds_usage_item',
  usage_menu: 'ds_usage_menu',
  unknown_items: 'ds_unknown_items',
  unknown_menu: 'ds_unknown_menu'
};

const db = {
  get(key, def = []){
    try{
      const v = localStorage.getItem(key);
      return v ? JSON.parse(v) : def;
    }catch{
      return def;
    }
  },
  set(key, val){
    localStorage.setItem(key, JSON.stringify(val));
  }
};

/* ================================
   INIT DATA (ONCE)
================================ */
function initData(){

  if (!localStorage.getItem(DB_KEY.categories)){
    db.set(DB_KEY.categories, [
      "Keringan",
      "Ayam potong",
      "Ayam kampung",
      "Belanja Pusat",
      "Sayur",
      "Lainnya"
    ]);
  }

  if (!localStorage.getItem(DB_KEY.purchases)){
    db.set(DB_KEY.purchases, []);
  }

  if (!localStorage.getItem(DB_KEY.sales)){
    db.set(DB_KEY.sales, []);
  }

  if (!localStorage.getItem(DB_KEY.items)){
    db.set(DB_KEY.items, []);
  }

  if (!localStorage.getItem(DB_KEY.usage_item)){
    db.set(DB_KEY.usage_item, {});
  }

  if (!localStorage.getItem(DB_KEY.usage_menu)){
    db.set(DB_KEY.usage_menu, {});
  }

  if (!localStorage.getItem(DB_KEY.unknown_items)){
    db.set(DB_KEY.unknown_items, []);
  }

  if (!localStorage.getItem(DB_KEY.unknown_menu)){
    db.set(DB_KEY.unknown_menu, []);
  }
}

/* ================================
   UTIL
================================ */
function normalize(text){
  return (text || "")
    .toLowerCase()
    .trim()
    .replace(/\s+/g," ");
}

function formatRp(n){
  return "Rp " + Number(n || 0).toLocaleString("id-ID");
}

function uid(){
  return Date.now() + Math.random();
}

/* ================================
   CATEGORY SYSTEM
================================ */
function getCategories(){
  return db.get(DB_KEY.categories);
}

function renderCats(){

  const cats = getCategories();
  const el = document.getElementById("cats");

  el.innerHTML = cats.map((c,i)=>`
    <div class="card row">
      <span>${c}</span>
      <div>
        <button class="btn-sm" onclick="renameCat(${i})">✏️</button>
        <button class="btn-sm" onclick="deleteCat(${i})">🗑</button>
      </div>
    </div>
  `).join("");
}

function addCat(){
  const input = document.getElementById("new-cat");
  const val = input.value.trim();

  if (!val) return;

  const cats = getCategories();

  if (cats.includes(val)){
    alert("Kategori sudah ada");
    return;
  }

  cats.push(val);
  db.set(DB_KEY.categories, cats);

  input.value = "";
  renderCats();
}

function renameCat(index){

  const cats = getCategories();
  const oldName = cats[index];

  const newName = prompt("Rename kategori:", oldName);
  if (!newName) return;

  cats[index] = newName;
  db.set(DB_KEY.categories, cats);

  /* update item */
  let items = db.get(DB_KEY.items);
  items = items.map(it=>{
    if (it.category === oldName){
      it.category = newName;
    }
    return it;
  });

  db.set(DB_KEY.items, items);

  renderCats();
}

function deleteCat(index){

  const cats = getCategories();
  const name = cats[index];

  if (!confirm("Hapus kategori: " + name + "?")) return;

  cats.splice(index,1);
  db.set(DB_KEY.categories, cats);

  /* fallback */
  let items = db.get(DB_KEY.items);
  items = items.map(it=>{
    if (it.category === name){
      it.category = "Lainnya";
    }
    return it;
  });

  db.set(DB_KEY.items, items);

  renderCats();
}

/* ================================
   USAGE TRACKING (FAVORITE BASE)
================================ */
function trackUsage(type, name){

  const key = type === "menu" ? DB_KEY.usage_menu : DB_KEY.usage_item;
  let data = db.get(key, {});

  name = normalize(name);

  data[name] = (data[name] || 0) + 1;

  db.set(key, data);
}

function getTopUsage(type, limit=5){

  const key = type === "menu" ? DB_KEY.usage_menu : DB_KEY.usage_item;
  const data = db.get(key, {});

  return Object.entries(data)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,limit)
    .map(x=>x[0]);
}

/* ================================
   UNKNOWN SYSTEM
================================ */
function addUnknown(type, name){

  const key = type === "menu" ? DB_KEY.unknown_menu : DB_KEY.unknown_items;
  let data = db.get(key);

  name = normalize(name);

  if (data.includes(name)) return;

  data.push(name);
  db.set(key, data);
}

/* ================================
   GLOBAL INIT
================================ */
function initApp(){

  initData();

  renderCats();
  renderList();
  renderSales();
  renderDashboard();
  renderAdmin();

  console.log("✅ CORE READY");
}

/* ================================
   START APP
================================ */
document.addEventListener("DOMContentLoaded", ()=>{
  initApp();
});
/* ================================
   WORD → NUMBER
================================ */
const WORD_NUM = {
  satu:1, dua:2, tiga:3, empat:4, lima:5,
  enam:6, tujuh:7, delapan:8, sembilan:9, sepuluh:10
};

function wordToNumber(word){
  return WORD_NUM[word] || null;
}

/* ================================
   PARSER BELANJA (FLEXIBLE)
================================ */
function parseInput(line){

  line = normalize(line);
  if (!line) return null;

  let m;

  // ayam 5 kg
  m = line.match(/^(.+?)\s+([\d,.]+)\s*([a-zA-Z]*)$/);
  if (m){
    return {
      name: normalize(m[1]),
      qty: parseFloat(m[2].replace(",", ".")) || 1,
      unit: m[3] || "pcs"
    };
  }

  // 5 kg ayam
  m = line.match(/^([\d,.]+)\s*([a-zA-Z]*)\s+(.+)$/);
  if (m){
    return {
      name: normalize(m[3]),
      qty: parseFloat(m[1]) || 1,
      unit: m[2] || "pcs"
    };
  }

  // ayam x5
  m = line.match(/^(.+?)\s*x\s*([\d,.]+)$/);
  if (m){
    return {
      name: normalize(m[1]),
      qty: parseFloat(m[2]) || 1,
      unit: "pcs"
    };
  }

  // ayam lima kg
  m = line.match(/^(.+?)\s+(satu|dua|tiga|empat|lima|enam|tujuh|delapan|sembilan|sepuluh)\s*([a-zA-Z]*)$/);
  if (m){
    return {
      name: normalize(m[1]),
      qty: wordToNumber(m[2]) || 1,
      unit: m[3] || "pcs"
    };
  }

  // ayam 5
  m = line.match(/^(.+?)\s+([\d,.]+)$/);
  if (m){
    return {
      name: normalize(m[1]),
      qty: parseFloat(m[2]) || 1,
      unit: "pcs"
    };
  }

  // fallback
  return {
    name: line,
    qty: 1,
    unit: "pcs",
    unknown: true
  };
}

/* ================================
   AUTO CATEGORY
================================ */
function autoCategory(name){

  name = normalize(name);

  if (name.includes("ayam kampung")) return "Ayam kampung";
  if (name.includes("ayam")) return "Ayam potong";
  if (name.includes("cabai") || name.includes("sayur") || name.includes("tomat")) return "Sayur";
  if (name.includes("kering") || name.includes("kerupuk")) return "Keringan";

  return "Lainnya";
}

/* ================================
   PROCESS BELANJA (CLEAN FLOW)
================================ */
function process(){

  const text = document.getElementById("bulk").value;
  const lines = text.split("\n").filter(l => l.trim());

  if (!lines.length){
    alert("Input kosong");
    return;
  }

  let purchases = db.get(DB_KEY.purchases);
  const master = db.get(DB_KEY.items);

  lines.forEach(line=>{

    const p = parseInput(line);
    if (!p) return;

    /* tracking */
    trackUsage("item", p.name);

    /* unknown detection */
    const found = master.find(i=>i.name === p.name);
    if (!found){
      addUnknown("item", p.name);
    }

    purchases.push({
      id: uid(),
      name: p.name,
      qty: p.qty,
      unit: p.unit,
      category: autoCategory(p.name),
      date: new Date().toISOString()
    });

  });

  db.set(DB_KEY.purchases, purchases);

  document.getElementById("bulk").value = "";

  renderList();
}

/* ================================
   GROUP BELANJA
================================ */
function groupByCategory(items){

  const map = {};

  items.forEach(it=>{
    if (!map[it.category]) map[it.category] = [];
    map[it.category].push(it);
  });

  return map;
}

/* ================================
   DELETE BELANJA
================================ */
function deleteItem(id){

  let data = db.get(DB_KEY.purchases);
  data = data.filter(d => d.id !== id);

  db.set(DB_KEY.purchases, data);

  renderList();
}

/* ================================
   EDIT BELANJA
================================ */
function editPurchase(id){

  let data = db.get(DB_KEY.purchases);
  const item = data.find(d=>d.id===id);
  if (!item) return;

  const qty = prompt("Edit qty:", item.qty);
  if (qty === null) return;

  item.qty = parseFloat(qty) || item.qty;

  db.set(DB_KEY.purchases, data);

  renderList();
}

/* ================================
   RENDER BELANJA
================================ */
function renderList(){

  const data = db.get(DB_KEY.purchases);
  const el = document.getElementById("list");

  if (!data.length){
    el.innerHTML = "<p>Belum ada data</p>";
    return;
  }

  const grouped = groupByCategory(data);

  let html = "";

  Object.keys(grouped).forEach(cat=>{

    html += `<div class="card"><b>${cat}</b>`;

    grouped[cat].forEach(it=>{
      html += `
        <div class="row" style="margin-top:6px">
          <span>${it.name} (${it.qty}${it.unit})</span>
          <div>
            <button class="btn-sm" onclick="editPurchase('${it.id}')">✏️</button>
            <button class="btn-sm" onclick="deleteItem('${it.id}')">✕</button>
          </div>
        </div>
      `;
    });

    html += `</div>`;
  });

  el.innerHTML = html;
}

/* ================================
   PARSE PENJUALAN
================================ */
function parseSale(line){

  line = normalize(line);
  if (!line) return null;

  const parts = line.split(" ");

  if (parts.length < 3){
    return { error:true };
  }

  const revenue = parseFloat(parts.pop());
  const qty = parseInt(parts.pop());
  const name = parts.join(" ");

  if (isNaN(qty) || isNaN(revenue)){
    return { error:true };
  }

  return { name, qty, revenue };
}

/* ================================
   PROCESS PENJUALAN (CLEAN)
================================ */
function processSale(){

  const text = document.getElementById("sale").value;
  const lines = text.split("\n").filter(l=>l.trim());

  if (!lines.length){
    alert("Input kosong");
    return;
  }

  let sales = db.get(DB_KEY.sales);
  const master = db.get(DB_KEY.items);

  lines.forEach(line=>{

    const p = parseSale(line);
    if (!p || p.error) return;

    /* tracking */
    trackUsage("menu", p.name);

    /* unknown */
    const found = master.find(i=>i.name === p.name);
    if (!found){
      addUnknown("menu", p.name);
    }

    sales.push({
      id: uid(),
      name: p.name,
      qty: p.qty,
      revenue: p.revenue,
      date: new Date().toISOString()
    });

  });

  db.set(DB_KEY.sales, sales);

  document.getElementById("sale").value = "";

  renderSales();
}

/* ================================
   GROUP SALES
================================ */
function groupSales(data){

  const map = {};

  data.forEach(s=>{
    if (!map[s.name]){
      map[s.name] = { name:s.name, qty:0, revenue:0 };
    }

    map[s.name].qty += s.qty;
    map[s.name].revenue += s.revenue;
  });

  return Object.values(map);
}

/* ================================
   RENDER SALES (WITH PROFIT)
================================ */
function renderSales(){

  const data = db.get(DB_KEY.sales);
  const today = new Date().toISOString().slice(0,10);

  const todaySales = data.filter(s=>s.date.startsWith(today));

  const el = document.getElementById("sale-list");

  if (!todaySales.length){
    el.innerHTML = "<p>Belum ada penjualan</p>";
    return;
  }

  const grouped = groupSales(todaySales);

  const totalRevenue = grouped.reduce((s,g)=>s+g.revenue,0);
  const totalProfit = totalRevenue * 0.4;

  let html = `
    <div class="card">
      <b>Revenue: ${formatRp(totalRevenue)}</b><br>
      <b>Profit: ${formatRp(totalProfit)}</b>
    </div>
  `;

  grouped.forEach(g=>{
    const profit = g.revenue * 0.4;
    const margin = Math.round((profit/g.revenue)*100);

    html += `
      <div class="card">
        <div class="row">
          <b>${g.name}</b>
          <span>${formatRp(g.revenue)}</span>
        </div>
        <small>
          ${g.qty} porsi · Profit: ${formatRp(profit)} · ${margin}%
        </small>
      </div>
    `;
  });

  el.innerHTML = html;
}
/* ================================
   STOCK CALCULATION
================================ */
function getStockIn(){

  const purchases = db.get(DB_KEY.purchases);
  const map = {};

  purchases.forEach(p=>{
    if (!map[p.name]) map[p.name] = 0;
    map[p.name] += p.qty;
  });

  return map;
}

function getStockOut(){

  const sales = db.get(DB_KEY.sales);
  const map = {};

  sales.forEach(s=>{
    if (!map[s.name]) map[s.name] = 0;
    map[s.name] += s.qty;
  });

  return map;
}

function getFinalStock(){

  const inMap = getStockIn();
  const outMap = getStockOut();

  const keys = new Set([
    ...Object.keys(inMap),
    ...Object.keys(outMap)
  ]);

  const result = {};

  keys.forEach(k=>{
    result[k] = (inMap[k] || 0) - (outMap[k] || 0);
  });

  return result;
}

/* ================================
   STOCK ALERT
================================ */
function getStockAlerts(){

  const stock = getFinalStock();
  const alerts = [];

  Object.entries(stock).forEach(([name, qty])=>{
    if (qty <= 0){
      alerts.push(`❗ ${name} habis`);
    } else if (qty < 3){
      alerts.push(`⚠ ${name} hampir habis (${qty})`);
    }
  });

  return alerts;
}

/* ================================
   TOP DATA
================================ */
function getTopPurchased(){

  const data = db.get(DB_KEY.purchases);
  const map = {};

  data.forEach(p=>{
    if (!map[p.name]) map[p.name] = 0;
    map[p.name] += p.qty;
  });

  return Object.entries(map)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5);
}

function getTopMenu(){

  const data = db.get(DB_KEY.sales);
  const map = {};

  data.forEach(s=>{
    if (!map[s.name]) map[s.name] = 0;
    map[s.name] += s.revenue;
  });

  return Object.entries(map)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5);
}

/* ================================
   SMART ALERT
================================ */
function generateInsights(){

  const purchases = db.get(DB_KEY.purchases);
  const sales = db.get(DB_KEY.sales);

  const insights = [];

  /* menu terlaris */
  const menuMap = {};
  sales.forEach(s=>{
    if (!menuMap[s.name]) menuMap[s.name]=0;
    menuMap[s.name]+=s.qty;
  });

  const topMenu = Object.entries(menuMap)
    .sort((a,b)=>b[1]-a[1])[0];

  if (topMenu){
    insights.push(`🔥 Terlaris: ${topMenu[0]} (${topMenu[1]})`);
  }

  /* kategori dominan */
  const catMap = {};
  purchases.forEach(p=>{
    if (!catMap[p.category]) catMap[p.category]=0;
    catMap[p.category]++;
  });

  const topCat = Object.entries(catMap)
    .sort((a,b)=>b[1]-a[1])[0];

  if (topCat){
    insights.push(`📦 Dominan: ${topCat[0]}`);
  }

  /* tidak ada penjualan */
  if (sales.length === 0 && purchases.length > 0){
    insights.push("⚠ Sudah belanja tapi belum ada penjualan");
  }

  return insights;
}

/* ================================
   FILTER SYSTEM
================================ */
let DASH_FILTER = "today";

function getDateRange(){

  const now = new Date();

  if (DASH_FILTER === "today"){
    return [now.toISOString().slice(0,10)];
  }

  if (DASH_FILTER === "week"){
    const arr = [];
    for (let i=0;i<7;i++){
      const d = new Date();
      d.setDate(now.getDate()-i);
      arr.push(d.toISOString().slice(0,10));
    }
    return arr;
  }

  return [];
}

function filterData(data){

  const dates = getDateRange();

  return data.filter(d=>{
    return dates.some(date => d.date.startsWith(date));
  });
}

/* ================================
   RENDER DASHBOARD (FINAL)
================================ */
function renderDashboard(){

  const el = document.getElementById("dash");

  const purchases = filterData(db.get(DB_KEY.purchases));
  const sales = filterData(db.get(DB_KEY.sales));

  const totalRevenue = sales.reduce((s,x)=>s+x.revenue,0);
  const totalProfit = totalRevenue * 0.4;

  const stock = getFinalStock();
  const stockAlerts = getStockAlerts();
  const insights = generateInsights();

  const topItems = getTopPurchased();
  const topMenu = getTopMenu();

  let html = "";

  /* FILTER */
  html += `
    <div class="card">
      <b>Filter</b><br><br>
      <button class="btn-sm" onclick="setDashFilter('today')">Hari Ini</button>
      <button class="btn-sm" onclick="setDashFilter('week')">7 Hari</button>
    </div>
  `;

  /* SUMMARY */
  html += `
    <div class="card">
      <b>Revenue: ${formatRp(totalRevenue)}</b><br>
      <b>Profit: ${formatRp(totalProfit)}</b>
    </div>
  `;

  /* STOCK */
  html += `<div class="card"><b>Stok</b>`;
  Object.entries(stock).forEach(([n,q])=>{
    html += `<div>${n}: ${q}</div>`;
  });
  html += `</div>`;

  /* ALERT */
  const allAlerts = [...stockAlerts, ...insights];
  if (allAlerts.length){
    html += `<div class="card"><b>Insight</b>`;
    allAlerts.forEach(a=>{
      html += `<div>${a}</div>`;
    });
    html += `</div>`;
  }

  /* TOP BELANJA */
  html += `
    <div class="card">
      <b>Top Belanja</b>
      ${topItems.map(i=>`<div>${i[0]} (${i[1]})</div>`).join("")}
    </div>
  `;

  /* TOP MENU */
  html += `
    <div class="card">
      <b>Top Menu</b>
      ${topMenu.map(i=>`<div>${i[0]} (${formatRp(i[1])})</div>`).join("")}
    </div>
  `;

  el.innerHTML = html;
}

/* ================================
   SET FILTER
================================ */
function setDashFilter(type){
  DASH_FILTER = type;
  renderDashboard();
}
/* ================================
   FAVORITE (SMART INPUT)
================================ */
function renderFavorites(){

  const favs = getTopUsage("item", 6);
  const wrap = document.getElementById("favorite-wrap");

  if (!favs.length){
    wrap.innerHTML = "";
    return;
  }

  wrap.innerHTML = `
    <div class="card">
      <b>⚡ Favorit</b>
      <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:5px">
        ${favs.map(f=>`
          <button class="tag" onclick="quickAdd('${f}')">${f}</button>
        `).join("")}
      </div>
    </div>
  `;
}

function quickAdd(name){
  const el = document.getElementById("bulk");
  el.value += (el.value ? "\n" : "") + name + " 1";
  el.focus();
}

/* ================================
   UNKNOWN → MASTER
================================ */
function renderUnknown(){

  const items = db.get(DB_KEY.unknown_items);
  const menus = db.get(DB_KEY.unknown_menu);

  const el = document.getElementById("unknown-wrap");

  let html = "";

  if (items.length){
    html += `<div class="card"><b>Unknown Items</b>`;
    items.forEach(n=>{
      html += `
        <div class="row">
          <span>${n}</span>
          <button class="btn-sm" onclick="convertItem('${n}')">✔</button>
        </div>
      `;
    });
    html += `</div>`;
  }

  if (menus.length){
    html += `<div class="card"><b>Unknown Menu</b>`;
    menus.forEach(n=>{
      html += `
        <div class="row">
          <span>${n}</span>
          <button class="btn-sm" onclick="convertMenu('${n}')">✔</button>
        </div>
      `;
    });
    html += `</div>`;
  }

  el.innerHTML = html;
}

function convertItem(name){

  let items = db.get(DB_KEY.items);

  items.push({
    name: name,
    category: "Lainnya"
  });

  db.set(DB_KEY.items, items);

  let unk = db.get(DB_KEY.unknown_items).filter(x=>x!==name);
  db.set(DB_KEY.unknown_items, unk);

  renderAdmin();
}

function convertMenu(name){

  let items = db.get(DB_KEY.items);

  items.push({
    name: name,
    category: "Menu"
  });

  db.set(DB_KEY.items, items);

  let unk = db.get(DB_KEY.unknown_menu).filter(x=>x!==name);
  db.set(DB_KEY.unknown_menu, unk);

  renderAdmin();
}

/* ================================
   MASTER ITEM
================================ */
function renderMaster(){

  const items = db.get(DB_KEY.items);
  const cats = getCategories();
  const el = document.getElementById("master-wrap");

  let html = `<div class="card"><b>Master Items</b>`;

  if (!items.length){
    html += `<p>Belum ada</p>`;
  }

  items.forEach((it,i)=>{
    html += `
      <div style="margin-top:6px">
        <div class="row">
          <b>${it.name}</b>
          <button class="btn-sm" onclick="deleteMaster(${i})">🗑</button>
        </div>
        <select onchange="changeMasterCat(${i}, this.value)">
          ${cats.map(c=>`
            <option value="${c}" ${it.category===c?'selected':''}>${c}</option>
          `).join("")}
        </select>
      </div>
    `;
  });

  html += `</div>
  <div class="card">
    <button class="btn" onclick="addMaster()">＋ Tambah Item</button>
  </div>`;

  el.innerHTML = html;
}

function addMaster(){

  const name = prompt("Nama item:");
  if (!name) return;

  const cats = getCategories();
  const cat = prompt("Kategori:", cats[0]);

  let items = db.get(DB_KEY.items);

  items.push({
    name: normalize(name),
    category: cat || "Lainnya"
  });

  db.set(DB_KEY.items, items);

  renderAdmin();
}

function deleteMaster(i){

  if (!confirm("Hapus item?")) return;

  let items = db.get(DB_KEY.items);
  items.splice(i,1);

  db.set(DB_KEY.items, items);

  renderAdmin();
}

function changeMasterCat(i, cat){

  let items = db.get(DB_KEY.items);
  items[i].category = cat;

  db.set(DB_KEY.items, items);
}

/* ================================
   TOOLS (EXPORT / RESET)
================================ */
function renderTools(){

  const el = document.getElementById("tools-wrap");

  el.innerHTML = `
    <div class="card">
      <b>Tools</b><br><br>

      <button class="btn" onclick="exportData()">Export Data</button>
      <button class="btn" onclick="triggerImport()">Import Data</button>

      <button class="btn" onclick="resetPurchases()">Reset Belanja</button>
      <button class="btn" onclick="resetSales()">Reset Penjualan</button>

      <button class="btn" style="background:red;color:#fff"
        onclick="resetAll()">RESET TOTAL</button>
    </div>
  `;
}

/* ================================
   EXPORT / IMPORT
================================ */
function exportData(){

  const data = {
    categories: db.get(DB_KEY.categories),
    purchases: db.get(DB_KEY.purchases),
    sales: db.get(DB_KEY.sales),
    items: db.get(DB_KEY.items)
  };

  const blob = new Blob(
    [JSON.stringify(data,null,2)],
    {type:"application/json"}
  );

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "backup.json";
  a.click();
}

function triggerImport(){

  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json";

  input.onchange = function(e){

    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(ev){

      try{
        const data = JSON.parse(ev.target.result);

        if (!confirm("Timpa data lama?")) return;

        if (data.categories) db.set(DB_KEY.categories,data.categories);
        if (data.purchases) db.set(DB_KEY.purchases,data.purchases);
        if (data.sales) db.set(DB_KEY.sales,data.sales);
        if (data.items) db.set(DB_KEY.items,data.items);

        location.reload();

      }catch{
        alert("File error");
      }

    };

    reader.readAsText(file);
  };

  input.click();
}

/* ================================
   RESET
================================ */
function resetPurchases(){
  if (!confirm("Reset belanja?")) return;
  db.set(DB_KEY.purchases, []);
  renderList();
}

function resetSales(){
  if (!confirm("Reset penjualan?")) return;
  db.set(DB_KEY.sales, []);
  renderSales();
}

function resetAll(){

  if (!confirm("Reset semua data?")) return;

  const code = prompt("Ketik RESET:");
  if (code !== "RESET") return;

  Object.values(DB_KEY).forEach(k=>{
    localStorage.removeItem(k);
  });

  location.reload();
}

/* ================================
   ADMIN RENDER (CENTRAL)
================================ */
function renderAdmin(){

  renderCats();
  renderMaster();
  renderUnknown();
  renderTools();
}

/* ================================
   UX ENHANCEMENT
================================ */
function setupUX(){

  const bulk = document.getElementById("bulk");
  const sale = document.getElementById("sale");

  bulk.addEventListener("keydown", e=>{
    if (e.ctrlKey && e.key === "Enter"){
      process();
    }
  });

  sale.addEventListener("keydown", e=>{
    if (e.ctrlKey && e.key === "Enter"){
      processSale();
    }
  });
}

/* ================================
   PERFORMANCE (LIGHT)
================================ */
function trimOldData(){

  const limit = new Date();
  limit.setDate(limit.getDate()-30);

  let p = db.get(DB_KEY.purchases).filter(x=>x.date >= limit.toISOString());
  let s = db.get(DB_KEY.sales).filter(x=>x.date >= limit.toISOString());

  db.set(DB_KEY.purchases, p);
  db.set(DB_KEY.sales, s);
}

/* ================================
   FINAL INIT EXTENSION
================================ */
(function(){

  const oldInit = initApp;

  initApp = function(){
    oldInit();

    renderFavorites();
    setupUX();
    trimOldData();

    console.log("🔥 APP FULL READY");
  };

})();
