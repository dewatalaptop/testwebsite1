<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dolan Sawah · Ops Pro</title>

<style>
:root{
  --bg:#111410;
  --bg2:#191c17;
  --surface:#252922;
  --acc:#7CDB6A;
  --text:#E8EDE5;
  --text2:#9BA696;
  --border:#2a2f27;
  --r:10px;
  --nav:62px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:sans-serif;
  background:var(--bg);
  color:var(--text);
}

#app{
  max-width:480px;
  margin:auto;
  min-height:100vh;
}

/* NAV */
#bnav{
  position:fixed;
  bottom:0;
  width:100%;
  max-width:480px;
  height:var(--nav);
  background:var(--bg2);
  display:flex;
  border-top:1px solid var(--border);
}

.nb{
  flex:1;
  border:none;
  background:none;
  color:var(--text2);
  font-size:11px;
}

.nb.active{
  color:var(--acc);
}

/* TAB */
.tab{
  display:none;
  padding:10px 10px 80px;
}
.tab.active{
  display:block;
}

/* CARD */
.card{
  background:var(--surface);
  padding:12px;
  border-radius:var(--r);
  margin-bottom:10px;
}

/* INPUT */
.inp{
  width:100%;
  padding:10px;
  border-radius:6px;
  border:1px solid var(--border);
  background:#00000020;
  color:var(--text);
}

/* BUTTON */
.btn{
  padding:10px;
  border:none;
  border-radius:6px;
  background:var(--acc);
  color:#000;
  font-weight:bold;
  margin-top:6px;
}
</style>
</head>

<body>
<div id="app">

<nav id="bnav">
  <button class="nb active" onclick="goTab('belanja',this)">Belanja</button>
  <button class="nb" onclick="goTab('penjualan',this)">Jual</button>
  <button class="nb" onclick="goTab('dashboard',this)">Dash</button>
  <button class="nb" onclick="goTab('admin',this)">Admin</button>
</nav>

<div id="tab-belanja" class="tab active">
  <h2>Belanja</h2>
  <textarea id="bulk" class="inp"></textarea>
  <button class="btn" onclick="process()">Tambah</button>
  <div id="list"></div>
</div>

<div id="tab-penjualan" class="tab">
  <h2>Penjualan</h2>
  <textarea id="sale" class="inp"></textarea>
  <button class="btn" onclick="processSale()">Tambah</button>
  <div id="sale-list"></div>
</div>

<div id="tab-dashboard" class="tab">
  <h2>Dashboard</h2>
  <div id="dash"></div>
</div>

<div id="tab-admin" class="tab">
  <h2>Admin</h2>
  <input id="new-cat" class="inp">
  <button class="btn" onclick="addCat()">Tambah Kategori</button>
  <div id="cats"></div>
</div>

<script>
/* ================================
   NAVIGATION (WAJIB ADA)
================================ */
function goTab(tab, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));

  document.getElementById('tab-' + tab).classList.add('active');
  el.classList.add('active');

  if(tab === 'dashboard' && typeof renderDashboard === 'function'){
    renderDashboard();
  }
}

/* ================================
   STORAGE LAYER
================================ */
const DB_KEY = {
  categories: 'ds_categories',
  purchases: 'ds_purchases',
  sales: 'ds_sales',
  items: 'ds_items'
};

const db = {
  get(key, def = []) {
    try {
      const v = localStorage.getItem(key);
      return v ? JSON.parse(v) : def;
    } catch {
      return def;
    }
  },
  set(key, val) {
    localStorage.setItem(key, JSON.stringify(val));
  }
};

/* ================================
   DEFAULT CATEGORY (REQUESTED)
================================ */
function seedCategories() {
  if (!localStorage.getItem(DB_KEY.categories)) {
    db.set(DB_KEY.categories, [
      "Keringan",
      "Ayam potong",
      "Ayam kampung",
      "Belanja Pusat",
      "Sayur",
      "Lainnya"
    ]);
  }
}

/* ================================
   INIT BASE DATA
================================ */
function initData() {
  seedCategories();

  if (!localStorage.getItem(DB_KEY.purchases)) {
    db.set(DB_KEY.purchases, []);
  }

  if (!localStorage.getItem(DB_KEY.sales)) {
    db.set(DB_KEY.sales, []);
  }

  if (!localStorage.getItem(DB_KEY.items)) {
    db.set(DB_KEY.items, []);
  }
}

/* ================================
   CATEGORY RENDER
================================ */
function renderCats() {
  const cats = db.get(DB_KEY.categories);
  const el = document.getElementById("cats");

  el.innerHTML = cats.map((c, i) => `
    <div class="card">
      ${c}
      <button onclick="renameCat(${i})">✏️</button>
      <button onclick="deleteCat(${i})">🗑</button>
    </div>
  `).join("");
}

/* ================================
   ADD CATEGORY
================================ */
function addCat() {
  const input = document.getElementById("new-cat");
  const val = input.value.trim();

  if (!val) return;

  const cats = db.get(DB_KEY.categories);

  if (cats.includes(val)) {
    alert("Kategori sudah ada");
    return;
  }

  cats.push(val);
  db.set(DB_KEY.categories, cats);

  input.value = "";
  renderCats();
}

/* ================================
   RENAME CATEGORY
================================ */
function renameCat(index) {
  const cats = db.get(DB_KEY.categories);
  const oldName = cats[index];

  const newName = prompt("Rename kategori:", oldName);
  if (!newName) return;

  cats[index] = newName;
  db.set(DB_KEY.categories, cats);

  let items = db.get(DB_KEY.items);
  items = items.map(it => {
    if (it.category === oldName) {
      it.category = newName;
    }
    return it;
  });

  db.set(DB_KEY.items, items);

  renderCats();
}

/* ================================
   DELETE CATEGORY (SAFE)
================================ */
function deleteCat(index) {
  const cats = db.get(DB_KEY.categories);
  const name = cats[index];

  if (!confirm("Hapus kategori: " + name + "?")) return;

  cats.splice(index, 1);
  db.set(DB_KEY.categories, cats);

  let items = db.get(DB_KEY.items);
  items = items.map(it => {
    if (it.category === name) {
      it.category = "Lainnya";
    }
    return it;
  });

  db.set(DB_KEY.items, items);

  renderCats();
}

/* ================================
   INIT
================================ */
initData();
renderCats();
/* ================================
   UTIL NORMALIZE
================================ */
function normalize(text) {
  return (text || "")
    .toLowerCase()
    .trim()
    .replace(/\s+/g, " ");
}

/* ================================
   WORD → NUMBER
================================ */
const WORD_NUM = {
  satu:1, dua:2, tiga:3, empat:4, lima:5,
  enam:6, tujuh:7, delapan:8, sembilan:9, sepuluh:10
};

function wordToNumber(word){
  return WORD_NUM[word] || null;
}

/* ================================
   PARSER FLEXIBLE
================================ */
function parseInput(line){
  line = normalize(line);
  if (!line) return null;

  let m;

  // ayam 5 kg
  m = line.match(/^(.+?)\s+([\d,.]+)\s*([a-zA-Z]*)$/);
  if (m) {
    return {
      name: normalize(m[1]),
      qty: parseFloat(m[2].replace(",", ".")) || 1,
      unit: m[3] || "pcs"
    };
  }

  // 5 kg ayam
  m = line.match(/^([\d,.]+)\s*([a-zA-Z]*)\s+(.+)$/);
  if (m) {
    return {
      name: normalize(m[3]),
      qty: parseFloat(m[1]) || 1,
      unit: m[2] || "pcs"
    };
  }

  // ayam x5
  m = line.match(/^(.+?)\s*x\s*([\d,.]+)$/);
  if (m) {
    return {
      name: normalize(m[1]),
      qty: parseFloat(m[2]) || 1,
      unit: "pcs"
    };
  }

  // ayam 5
  m = line.match(/^(.+?)\s+([\d,.]+)$/);
  if (m) {
    return {
      name: normalize(m[1]),
      qty: parseFloat(m[2]) || 1,
      unit: "pcs"
    };
  }

  // ayam lima kg
  m = line.match(/^(.+?)\s+(satu|dua|tiga|empat|lima|enam|tujuh|delapan|sembilan|sepuluh)\s*([a-zA-Z]*)$/);
  if (m) {
    return {
      name: normalize(m[1]),
      qty: wordToNumber(m[2]) || 1,
      unit: m[3] || "pcs"
    };
  }

  // fallback
  return {
    name: line,
    qty: 1,
    unit: "pcs",
    unknown: true
  };
}

/* ================================
   DEBUG (OPTIONAL)
================================ */
function debugParse(){
  const txt = document.getElementById("bulk").value;
  const lines = txt.split("\n");

  console.log("=== PARSE RESULT ===");
  lines.forEach(l=>{
    console.log(parseInput(l));
  });
}
/* ================================
   AUTO CATEGORY (SMART BASIC)
================================ */
function autoCategory(name){
  name = normalize(name);

  if (name.includes("ayam kampung")) return "Ayam kampung";
  if (name.includes("ayam")) return "Ayam potong";
  if (name.includes("cabai") || name.includes("sayur") || name.includes("tomat")) return "Sayur";
  if (name.includes("kering") || name.includes("kerupuk")) return "Keringan";

  return "Lainnya";
}

/* ================================
   PROCESS BELANJA
================================ */
function process(){
  const text = document.getElementById("bulk").value;
  const lines = text.split("\n").filter(l => l.trim());

  if (!lines.length) {
    alert("Input kosong");
    return;
  }

  let data = db.get(DB_KEY.purchases);

  lines.forEach(line => {
    const p = parseInput(line);
    if (!p) return;

    const cat = autoCategory(p.name);

    data.push({
      id: Date.now() + Math.random(),
      name: p.name,
      qty: p.qty,
      unit: p.unit,
      category: cat,
      date: new Date().toISOString()
    });
  });

  db.set(DB_KEY.purchases, data);

  document.getElementById("bulk").value = "";

  renderList();
}

/* ================================
   GROUP BY CATEGORY
================================ */
function groupByCategory(items){
  const map = {};
  items.forEach(it => {
    if (!map[it.category]) map[it.category] = [];
    map[it.category].push(it);
  });
  return map;
}

/* ================================
   DELETE ITEM
================================ */
function deleteItem(id){
  let data = db.get(DB_KEY.purchases);
  data = data.filter(d => d.id !== id);
  db.set(DB_KEY.purchases, data);
  renderList();
}

/* ================================
   RENDER BELANJA
================================ */
function renderList(){
  const data = db.get(DB_KEY.purchases);

  const el = document.getElementById("list");

  if (!data.length){
    el.innerHTML = "<p>Belum ada data</p>";
    return;
  }

  const grouped = groupByCategory(data);

  let html = "";

  Object.keys(grouped).forEach(cat => {
    html += `<div class="card"><b>${cat}</b>`;

    grouped[cat].forEach(it => {
      html += `
        <div style="display:flex;justify-content:space-between;margin-top:5px">
          <span>${it.name} (${it.qty}${it.unit})</span>
          <button onclick="deleteItem(${it.id})">✕</button>
        </div>
      `;
    });

    html += `</div>`;
  });

  el.innerHTML = html;
}

/* ================================
   INIT RENDER BELANJA
================================ */
renderList();
/* ================================
   PARSE PENJUALAN
================================ */
function parseSale(line){
  line = normalize(line);
  if (!line) return null;

  const parts = line.split(" ");

  if (parts.length < 3) {
    return { error: true };
  }

  const revenue = parseFloat(parts.pop());
  const qty = parseInt(parts.pop());
  const name = parts.join(" ");

  if (isNaN(qty) || isNaN(revenue)) {
    return { error: true };
  }

  return {
    name,
    qty,
    revenue
  };
}

/* ================================
   PROCESS PENJUALAN
================================ */
function processSale(){
  const text = document.getElementById("sale").value;
  const lines = text.split("\n").filter(l => l.trim());

  if (!lines.length) {
    alert("Input kosong");
    return;
  }

  let data = db.get(DB_KEY.sales);

  lines.forEach(line => {
    const p = parseSale(line);
    if (!p || p.error) return;

    data.push({
      id: Date.now() + Math.random(),
      name: p.name,
      qty: p.qty,
      revenue: p.revenue,
      date: new Date().toISOString()
    });
  });

  db.set(DB_KEY.sales, data);

  document.getElementById("sale").value = "";

  renderSales();
}

/* ================================
   GROUP SALES
================================ */
function groupSales(data){
  const map = {};

  data.forEach(s => {
    if (!map[s.name]) {
      map[s.name] = {
        name: s.name,
        qty: 0,
        revenue: 0
      };
    }

    map[s.name].qty += s.qty;
    map[s.name].revenue += s.revenue;
  });

  return Object.values(map);
}

/* ================================
   FORMAT RUPIAH
================================ */
function formatRp(n){
  return "Rp " + Number(n || 0).toLocaleString("id-ID");
}

/* ================================
   RENDER SALES
================================ */
function renderSales(){
  const data = db.get(DB_KEY.sales);
  const today = new Date().toISOString().slice(0,10);

  const todaySales = data.filter(s => s.date.startsWith(today));

  const el = document.getElementById("sale-list");

  if (!todaySales.length){
    el.innerHTML = "<p>Belum ada penjualan</p>";
    return;
  }

  const grouped = groupSales(todaySales);

  const totalRevenue = grouped.reduce((sum, g) => sum + g.revenue, 0);

  let html = `
    <div class="card">
      <b>Total Revenue: ${formatRp(totalRevenue)}</b>
    </div>
  `;

  grouped.forEach(g => {
    html += `
      <div class="card">
        <div style="display:flex;justify-content:space-between">
          <b>${g.name}</b>
          <span>${formatRp(g.revenue)}</span>
        </div>
        <small>${g.qty} porsi</small>
      </div>
    `;
  });

  el.innerHTML = html;
}

/* ================================
   INIT RENDER PENJUALAN
================================ */
renderSales();
/* ================================
   COST ESTIMATION (SIMPLE)
================================ */
/*
  Karena kita belum punya resep detail,
  kita pakai pendekatan sederhana:

  cost = persentase dari revenue
  default: 60% (bisa kamu ubah nanti)
*/

function estimateCost(revenue){
  return revenue * 0.6;
}

/* ================================
   CALCULATE PROFIT
================================ */
function calculateProfit(data){
  return data.map(s => {
    const cost = estimateCost(s.revenue);
    const profit = s.revenue - cost;
    const margin = s.revenue ? (profit / s.revenue * 100) : 0;

    return {
      ...s,
      cost,
      profit,
      margin
    };
  });
}

/* ================================
   RENDER SALES WITH PROFIT
================================ */
function renderSales(){
  const data = db.get(DB_KEY.sales);
  const today = new Date().toISOString().slice(0,10);

  const todaySales = data.filter(s => s.date.startsWith(today));

  const el = document.getElementById("sale-list");

  if (!todaySales.length){
    el.innerHTML = "<p>Belum ada penjualan</p>";
    return;
  }

  const enriched = calculateProfit(todaySales);
  const grouped = groupSales(enriched);

  const totalRevenue = grouped.reduce((s,g)=>s+g.revenue,0);
  const totalProfit = grouped.reduce((s,g)=>s+(g.revenue - estimateCost(g.revenue)),0);

  let html = `
    <div class="card">
      <b>Revenue: ${formatRp(totalRevenue)}</b><br>
      <b>Profit: ${formatRp(totalProfit)}</b>
    </div>
  `;

  grouped.forEach(g => {
    const cost = estimateCost(g.revenue);
    const profit = g.revenue - cost;
    const margin = g.revenue ? Math.round(profit / g.revenue * 100) : 0;

    html += `
      <div class="card">
        <div style="display:flex;justify-content:space-between">
          <b>${g.name}</b>
          <span>${formatRp(g.revenue)}</span>
        </div>
        <small>
          ${g.qty} porsi · 
          Profit: ${formatRp(profit)} · 
          ${margin}%
        </small>
      </div>
    `;
  });

  el.innerHTML = html;
}
/* ================================
   STOCK CALCULATION
================================ */

/*
  Konsep:
  - Belanja = stok masuk
  - Penjualan = stok keluar (approx)
*/

/* ================================
   HITUNG STOK MASUK
================================ */
function getStockIn(){
  const purchases = db.get(DB_KEY.purchases);
  const map = {};

  purchases.forEach(p => {
    const key = p.name;

    if (!map[key]) {
      map[key] = 0;
    }

    map[key] += p.qty;
  });

  return map;
}

/* ================================
   HITUNG STOK KELUAR (ESTIMASI)
================================ */
/*
  Karena belum ada resep,
  kita pakai pendekatan sederhana:

  1 menu = 1 unit bahan utama (sementara)
*/
function getStockOut(){
  const sales = db.get(DB_KEY.sales);
  const map = {};

  sales.forEach(s => {
    const key = s.name;

    if (!map[key]) {
      map[key] = 0;
    }

    map[key] += s.qty;
  });

  return map;
}

/* ================================
   HITUNG STOK FINAL
================================ */
function getFinalStock(){
  const stockIn = getStockIn();
  const stockOut = getStockOut();

  const allKeys = new Set([
    ...Object.keys(stockIn),
    ...Object.keys(stockOut)
  ]);

  const result = {};

  allKeys.forEach(k => {
    const masuk = stockIn[k] || 0;
    const keluar = stockOut[k] || 0;

    result[k] = masuk - keluar;
  });

  return result;
}

/* ================================
   STOCK ALERT
================================ */
function getStockAlerts(){
  const stock = getFinalStock();
  const alerts = [];

  Object.entries(stock).forEach(([name, qty]) => {
    if (qty <= 0) {
      alerts.push({
        type: "danger",
        msg: `${name} habis`
      });
    } else if (qty < 3) {
      alerts.push({
        type: "warning",
        msg: `${name} hampir habis (${qty})`
      });
    }
  });

  return alerts;
}
/* ================================
   DASHBOARD RENDER
================================ */
function renderDashboard(){

  const purchases = db.get(DB_KEY.purchases);
  const sales = db.get(DB_KEY.sales);

  const today = new Date().toISOString().slice(0,10);

  const todaySales = sales.filter(s => s.date.startsWith(today));
  const todayPurchases = purchases.filter(p => p.date.startsWith(today));

  const totalRevenue = todaySales.reduce((s, r) => s + r.revenue, 0);
  const totalCost = totalRevenue * 0.6;
  const totalProfit = totalRevenue - totalCost;

  const stock = getFinalStock();
  const alerts = getStockAlerts();

  const el = document.getElementById("dash");

  let html = "";

  /* SUMMARY */
  html += `
    <div class="card">
      <b>Revenue: ${formatRp(totalRevenue)}</b><br>
      <b>Profit: ${formatRp(totalProfit)}</b><br>
      <small>${todaySales.length} transaksi</small>
    </div>
  `;

  /* STOCK */
  html += `<div class="card"><b>Stok Saat Ini</b>`;

  Object.entries(stock).forEach(([name, qty])=>{
    html += `<div>${name}: ${qty}</div>`;
  });

  html += `</div>`;

  /* ALERT */
  if (alerts.length){
    html += `<div class="card"><b>Alert</b>`;
    alerts.forEach(a=>{
      html += `<div>${a.msg}</div>`;
    });
    html += `</div>`;
  }

  /* PURCHASE INFO */
  html += `
    <div class="card">
      <b>Belanja Hari Ini</b><br>
      <small>${todayPurchases.length} item</small>
    </div>
  `;

  el.innerHTML = html;
}
/* ================================
   SMART ALERT ENGINE
================================ */

function generateSmartAlerts(){

  const purchases = db.get(DB_KEY.purchases);
  const sales = db.get(DB_KEY.sales);

  const alerts = [];

  /* ============================
     1. MENU PALING LAKU
  ============================ */
  const menuMap = {};

  sales.forEach(s => {
    if (!menuMap[s.name]) {
      menuMap[s.name] = 0;
    }
    menuMap[s.name] += s.qty;
  });

  const topMenu = Object.entries(menuMap)
    .sort((a,b)=>b[1]-a[1])[0];

  if (topMenu){
    alerts.push({
      type:"info",
      msg:`🔥 Menu terlaris: ${topMenu[0]} (${topMenu[1]} porsi)`
    });
  }

  /* ============================
     2. KATEGORI DOMINAN
  ============================ */
  const catMap = {};

  purchases.forEach(p => {
    if (!catMap[p.category]) {
      catMap[p.category] = 0;
    }
    catMap[p.category]++;
  });

  const topCat = Object.entries(catMap)
    .sort((a,b)=>b[1]-a[1])[0];

  if (topCat){
    alerts.push({
      type:"info",
      msg:`📦 Kategori dominan: ${topCat[0]} (${topCat[1]} item)`
    });
  }

  /* ============================
     3. MENU KURANG LAKU
  ============================ */
  const lowMenu = Object.entries(menuMap)
    .filter(([k,v])=>v < 3);

  if (lowMenu.length){
    alerts.push({
      type:"warning",
      msg:`⚠ Menu kurang laku: ${lowMenu.slice(0,2).map(m=>m[0]).join(", ")}`
    });
  }

  /* ============================
     4. BELANJA TERLALU BANYAK
  ============================ */
  if (purchases.length > 20){
    alerts.push({
      type:"warning",
      msg:`⚠ Belanja hari ini cukup banyak (${purchases.length} item)`
    });
  }

  /* ============================
     5. TIDAK ADA PENJUALAN
  ============================ */
  if (sales.length === 0 && purchases.length > 0){
    alerts.push({
      type:"danger",
      msg:`❗ Sudah belanja tapi belum ada penjualan`
    });
  }

  return alerts;
}

/* ================================
   UPDATE DASHBOARD ALERT
================================ */

function renderDashboard(){

  const purchases = db.get(DB_KEY.purchases);
  const sales = db.get(DB_KEY.sales);

  const today = new Date().toISOString().slice(0,10);

  const todaySales = sales.filter(s => s.date.startsWith(today));
  const todayPurchases = purchases.filter(p => p.date.startsWith(today));

  const totalRevenue = todaySales.reduce((s, r) => s + r.revenue, 0);
  const totalCost = totalRevenue * 0.6;
  const totalProfit = totalRevenue - totalCost;

  Object.entries(stock).forEach(([name, qty])=>{
    html += `<div>${name}: ${qty}</div>`;
  });
  html += `</div>`;

  /* ALERT */
  const allAlerts = [...stockAlerts, ...smartAlerts];

  if (allAlerts.length){
    html += `<div class="card"><b>Insight</b>`;
    allAlerts.forEach(a=>{
      html += `<div>${a.msg}</div>`;

  html += `
    <div class="card">
      <b>Belanja Hari Ini</b><br>
      <small>${todayPurchases.length} item</small>
    </div>
  `;

  el.innerHTML = html;
}
/* ================================
   MERGE BELANJA (ANTI DUPLIKAT)
================================ */
function mergePurchases(data){
  const map = {};

  data.forEach(p => {
    const key = p.name + "_" + p.unit;

    if (!map[key]) {
      map[key] = { ...p };
    } else {
      map[key].qty += p.qty;
    }
  });

  return Object.values(map);
}

/* ================================
   MERGE PENJUALAN (ANTI DUPLIKAT)
================================ */
function mergeSales(data){
  const map = {};

  data.forEach(s => {
    const key = s.name;

    if (!map[key]) {
      map[key] = { ...s };
    } else {
      map[key].qty += s.qty;
      map[key].revenue += s.revenue;
    }
  });

  return Object.values(map);
}

/* ================================
   CLEAN DATA (RUN AFTER INPUT)
================================ */
function cleanData(){

  /* CLEAN BELANJA */
  let purchases = db.get(DB_KEY.purchases);
  purchases = mergePurchases(purchases);
  db.set(DB_KEY.purchases, purchases);

  /* CLEAN SALES */
  let sales = db.get(DB_KEY.sales);
  sales = mergeSales(sales);
  db.set(DB_KEY.sales, sales);

}

/* ================================
   IMPORT DATA (UPLOAD JSON)
================================ */
function importData(event){

  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);

      if (!confirm("Import akan menimpa semua data. Lanjut?")) return;

      if (data.categories) db.set(DB_KEY.categories, data.categories);
      if (data.purchases) db.set(DB_KEY.purchases, data.purchases);
      if (data.sales) db.set(DB_KEY.sales, data.sales);
      if (data.items) db.set(DB_KEY.items, data.items);

      alert("Import berhasil");

      renderCats();
      renderList();
      renderSales();
      renderDashboard();

    }catch(err){
      alert("File tidak valid");
    }
  };

  reader.readAsText(file);
}

  const input = document.createElement("input");
  input.type = "file";

}

/* ================================

================================ */
let DASH_FILTER = "today"; // today | week

/* ================================
   GET DATE RANGE
================================ */
function getDateRange(){

  const now = new Date();

  if (DASH_FILTER === "today"){
    return [now.toISOString().slice(0,10)];
  }

  if (DASH_FILTER === "week"){
    const days = [];
    for (let i=0;i<7;i++){
      const d = new Date();
      d.setDate(now.getDate() - i);
      days.push(d.toISOString().slice(0,10));
    }
    return days;
  }

  return [];
}

/* ================================
   FILTER DATA BY RANGE
================================ */
function filterByDate(data){

  const dates = getDateRange();

  return data.filter(d => {
    return dates.some(date => d.date.startsWith(date));
  });
}

          btn.textContent = "✏️";
          btn.className = "edit-sale";
          btn.onclick = ()=>editSale(d.id);

          card.appendChild(btn);
        }
      });

    });
};
/* ================================
   DOUBLE CONFIRM RESET
================================ */
function resetAllData(){

  const step1 = confirm("⚠ Reset semua data?");
  if (!step1) return;

  const code = prompt("Ketik 'RESET' untuk konfirmasi:");

  if (code !== "RESET"){
    alert("Dibatalkan");
    return;
  }

  /* CLEAR STORAGE */
  Object.values(DB_KEY).forEach(key=>{
    localStorage.removeItem(key);
  });

  alert("Data berhasil dihapus");

  location.reload();
}

/* ================================
   RESET PER TYPE
================================ */
function resetPurchases(){
  if (!confirm("Hapus semua data belanja?")) return;

  db.set(DB_KEY.purchases, []);
  renderList();
  renderDashboard();
}

function resetSales(){
  if (!confirm("Hapus semua data penjualan?")) return;

  db.set(DB_KEY.sales, []);
  renderSales();
  renderDashboard();
}

/* ================================
   AUTO BACKUP BEFORE RESET
================================ */
function safeReset(){

  if (!confirm("Backup dulu sebelum reset?")) return;

  exportData(); // dari part 11

  setTimeout(()=>{
    resetAllData();
  }, 500);
}

/* ================================
   RENDER RESET UI (ADMIN)
================================ */
function renderResetUI(){

  const el = document.getElementById("tab-admin");

  const html = `
    <div class="card">
      <b>⚠ Reset & Safety</b><br><br>

      <button class="btn" onclick="safeReset()">💾 Backup + Reset</button><br><br>

      <button class="btn" onclick="resetPurchases()">Hapus Belanja</button><br><br>

      <button class="btn" onclick="resetSales()">Hapus Penjualan</button><br><br>

      <button class="btn" style="background:red;color:white"
        onclick="resetAllData()">RESET TOTAL</button>
    </div>
  `;

  el.insertAdjacentHTML("beforeend", html);
}

/* ================================
   INIT RESET UI
================================ */
setTimeout(()=>{
  renderResetUI();
}, 900);
/* ================================
   SIMPLE CACHE (PERFORMANCE)
================================ */
const CACHE = {};

function cacheGet(key, fn){
  if (CACHE[key]) return CACHE[key];
  const val = fn();
  CACHE[key] = val;
  return val;
}

function clearCache(){
  for (let k in CACHE){
    delete CACHE[k];
  }
}

/* ================================
   PATCH DB SET (AUTO CLEAR CACHE)
================================ */
const _oldSet = db.set;
db.set = function(key, val){
  _oldSet(key, val);
  clearCache();
};

/* ================================
   DEBOUNCE RENDER
================================ */
function debounce(fn, delay=200){
  let t;
  return function(){
    clearTimeout(t);
    t = setTimeout(()=>fn.apply(this, arguments), delay);
  };
}

/* ================================
   SMOOTH RENDER PATCH
================================ */
renderList = debounce(renderList, 100);
renderSales = debounce(renderSales, 100);
renderDashboard = debounce(renderDashboard, 150);

/* ================================
   SAFE RENDER WRAPPER
================================ */
function safeRender(fn){
  try{
    fn();
  }catch(e){
    console.error("Render error:", e);
  }
}

/* ================================
   GLOBAL RENDER SAFE
================================ */
const _r1 = renderList;
renderList = ()=>safeRender(_r1);

const _r2 = renderSales;
renderSales = ()=>safeRender(_r2);

const _r3 = renderDashboard;
renderDashboard = ()=>safeRender(_r3);

/* ================================
   AUTO TRIM STORAGE (PREVENT BLOAT)
================================ */
function trimData(){

  let purchases = db.get(DB_KEY.purchases);
  let sales = db.get(DB_KEY.sales);

  /* keep last 30 days only */
  const limitDate = new Date();
  limitDate.setDate(limitDate.getDate() - 30);

  const limitStr = limitDate.toISOString();

  purchases = purchases.filter(p => p.date >= limitStr);
  sales = sales.filter(s => s.date >= limitStr);

  db.set(DB_KEY.purchases, purchases);
  db.set(DB_KEY.sales, sales);
}

/* run trim once per load */
setTimeout(()=>{
  trimData();
}, 2000);

/* ================================
   AUTO SAVE SCROLL POSITION
================================ */
window.addEventListener("scroll", ()=>{
  localStorage.setItem("scrollY", window.scrollY);
});

window.addEventListener("load", ()=>{
  const y = localStorage.getItem("scrollY");
  if (y){
    window.scrollTo(0, parseInt(y));
  }
});

/* ================================
   FINAL INIT MESSAGE
================================ */
setTimeout(()=>{
  console.log("🔥 Dolan Sawah Ops PRO READY");
}, 1000);
</script>

   GLOBAL INIT (SATU PINTU)

function initApp(){

  try{

/* ================================
   TAB NAVIGATION (SAFE)
================================ */
function goTab(tab, el){

  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.remove("active");
  });

  document.querySelectorAll(".nb").forEach(b=>{
    b.classList.remove("active");
  });

  document.getElementById("tab-" + tab).classList.add("active");
  el.classList.add("active");

  /* lazy render */
  if (tab === "dashboard") renderDashboard();
  if (tab === "penjualan") renderSales();
  if (tab === "belanja") renderList();
  if (tab === "admin") renderCats();
}

/* ================================
   FIRST LOAD (NO DUPLICATE INIT)
================================ */
if (!window.__APP_INIT__){
  window.__APP_INIT__ = true;

  document.addEventListener("DOMContentLoaded", ()=>{
    initApp();
  });
}

</script>
